# Get Bookking: proxy *.getbookking.com → Firebase web.app/{slug}/...
# Team invites: apex + www /join* must hit this worker so they reach Firebase join.html.
# 1. Add zone getbookking.com to Cloudflare (nameservers).
# 2. npx wrangler login
# 3. npx wrangler deploy

name = "getbookking-tenant-proxy"
main = "src/index.js"
compatibility_date = "2024-10-22"

routes = [
  { pattern = "*.getbookking.com/*", zone_name = "getbookking.com" },
  { pattern = "getbookking.com/join*", zone_name = "getbookking.com" },
  { pattern = "www.getbookking.com/join*", zone_name = "getbookking.com" }
]
