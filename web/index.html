<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book an appointment</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      color: #333;
      background: #f5f5f5;
      background-size: auto;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 24px; min-height: 100vh; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .logo { max-height: 120px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .tagline { font-size: 14px; color: #666; margin-bottom: 36px; }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .card-header .logo {
      width: 112px;
      height: 112px;
      max-height: none;
      object-fit: cover;
      flex-shrink: 0;
      margin: 0;
      border-radius: 8px;
    }
    .card-header-text { flex: 1; min-width: 0; }
    .card-header-text h1 { font-size: 24px; margin: 0 0 6px; }
    .card-header-text .tagline { font-size: 14px; color: #666; margin: 0; }
    .service-list { list-style: none; padding: 0; margin: 0; margin-top: 8px; }
    .service-item {
      display: block;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: #f0f0f0;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      font-weight: 500;
      transition: background 0.2s;
    }
    .service-item:hover { background: #e5e5e5; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type="file"] { padding: 8px; font-size: 14px; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link {
      display: inline-block;
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    .error { color: #c00; font-size: 14px; margin-bottom: 16px; }
    .success { color: #22c55e; font-size: 16px; font-weight: 500; text-align: center; padding: 24px; }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <div id="root">
    <div class="container">
      <div class="loading">Loading…</div>
    </div>
  </div>

      function parsePath() {
        var path = (location.pathname || '').replace(/^\/+|\/+$/g, '');
        var parts = path ? path.split('/') : [];
        var tenantSlug = parts[0] || '';
        var serviceSlug = parts[1] === 'book' && parts[2] ? parts[2] : '';
        return { tenantSlug: tenantSlug, serviceSlug: serviceSlug };
      }

      function applyBranding(t) {
        var bg = t.backgroundColor || '#FFFFFF';
        var card = t.cardSurfaceColor || '#F5F5F5';
        var txt = t.textColor || '#333333';
        var accent = t.primaryColor || '#000000';
        document.body.style.background = bg;
        document.body.style.color = txt;
        [].forEach.call(document.querySelectorAll('.card'), function(el){ el.style.background = card; });
        [].forEach.call(document.querySelectorAll('button[data-accent]'), function(el){ el.style.background = accent; el.style.color = '#fff'; });
        var pid = t.backgroundPattern || '';
        var pcolor = t.backgroundPatternColor || '#333333';
        var pop = t.backgroundPatternOpacity;
        if (pop == null) pop = 0.15;
        var fn = H[pid];
        if (fn) {
          document.body.style.backgroundImage = fn(pcolor, pop);
        } else {
          document.body.style.backgroundImage = '';
        }
      }

      function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
      function list(tenant, services) {
        var base = location.origin + '/' + tenant.slug;
        var items = services.map(function(s){ return '<a href="'+base+'/book/'+s.slug+'" class="service-item">'+esc(s.name)+'</a>'; }).join('');
        var title = '<h1>'+esc(tenant.displayName||'Book an appointment')+'</h1>';
        var taglineHtml = tenant.tagline ? '<p class="tagline">'+esc(tenant.tagline)+'</p>' : '';
        var header;
        if (tenant.logoUrl) {
          header = '<div class="card-header">' +
            '<img class="logo" src="'+tenant.logoUrl+'" alt="">' +
            '<div class="card-header-text">' + title + taglineHtml + '</div></div>';
        } else {
          header = title + taglineHtml;
        }
        return '<div class="card">' + header + '<ul class="service-list">'+items+'</ul></div>';
      }
      function field(f, services, presel) {
        var key = (f.key||'').replace(/[^a-zA-Z0-9_]/g,'');
        var name = 'f_'+key;
        var req = f.required ? ' required' : '';
        var lab = '<label for="'+name+'">'+esc(f.label||key)+'</label>';
        var inp = '';
        if (f.key === 'service') {
          var opts = (services||[]).map(function(s){
            var sel = presel && presel.id === s.id ? ' selected' : '';
            return '<option value="'+s.id+'" data-slug="'+(s.slug||'')+'" data-name="'+esc(s.name)+'"'+sel+'>'+esc(s.name)+'</option>';
          }).join('');
          inp = '<select id="'+name+'" name="'+name+'" data-key="service"'+req+'>'+opts+'</select>';
        } else if (f.type === 'select') {
          var oo = (f.options||[]).map(function(o){ return '<option value="'+esc(o)+'">'+esc(o)+'</option>'; }).join('');
          inp = '<select id="'+name+'" name="'+name+'" data-key="'+esc(f.key)+'"'+req+'>'+oo+'</select>';
        } else if (f.type === 'boolean') {
          inp = '<select id="'+name+'" name="'+name+'" data-key="'+esc(f.key)+'"'+req+'> <option value="">—</option><option value="yes">Yes</option><option value="no">No</option></select>';
        } else if (f.type === 'file') {
          inp = '<input type="file" accept="image/*" multiple id="'+name+'" name="'+name+'" data-key="'+esc(f.key)+'" data-type="file">';
        } else if (f.type === 'textarea') {
          inp = '<textarea id="'+name+'" name="'+name+'" data-key="'+esc(f.key)+'" placeholder="'+esc(f.label)+'"'+req+'></textarea>';
        } else {
          var typ = f.type === 'email' ? 'email' : f.type === 'phone' ? 'tel' : 'text';
          inp = '<input type="'+typ+'" id="'+name+'" name="'+name+'" data-key="'+esc(f.key)+'" placeholder="'+esc(f.label)+'"'+req+'>';
        }
        return lab + inp;
      }
      function form(tenant, services, presel) {
        var schema = tenant.formSchema || [];
        var useSchema = Array.isArray(schema) && schema.length > 0;
        var fields = useSchema ? schema : [
          {key:'name',label:'Full Name',type:'text',required:true},
          {key:'email',label:'Email',type:'email',required:true},
          {key:'phone',label:'Phone',type:'phone',required:false},
          {key:'service',label:'Service',type:'select',required:true},
          {key:'preferredTime',label:'Preferred Time',type:'text',required:false},
          {key:'notes',label:'Notes',type:'textarea',required:false}
        ];
        if (!fields.some(function(x){ return x.key === 'service'; })) {
          fields = [{key:'service',label:'Service',type:'select',required:true}].concat(fields);
        }
        var html = fields.map(function(f){
          if (f.key === 'service') return field({key:'service',label:'Service',type:'select',required:true,options:null}, services, presel);
          return field(f, services, presel);
        }).join('');
        var contact = (tenant.showContactOnPage !== false) && (tenant.contactPhone || tenant.contactEmail) ?
          '<p class="tagline">' + (tenant.contactPhone ? '📞 '+tenant.contactPhone+' ' : '') + (tenant.contactEmail ? '✉️ '+tenant.contactEmail : '') + '</p>' : '';
        return '<div class="card">' +
          '<a href="'+location.origin+'/'+tenant.slug+'" class="back-link">← Back to services</a>' +
          (tenant.logoUrl ? '<img class="logo" src="'+tenant.logoUrl+'" alt="">' : '') +
          '<h1>Book: '+esc(tenant.displayName||'Appointment')+'</h1>' + contact +
          '<form id="book-form">'+html+
          '<p id="form-error" class="error" style="display:none"></p>' +
          '<button type="submit" data-accent>Request booking</button></form></div>';
      }
      function success(){ return '<div class="card"><p class="success">✓ Request submitted! We\'ll get back to you soon.</p></div>'; }
      function err(m){ return '<div class="card"><h1>Oops</h1><p class="error">'+esc(m)+'</p></div>'; }

      function loadTenant(slug) {
        return db.collection('tenants').where('slug','==',slug.toLowerCase()).limit(1).get()
          .then(function(snap){
            if (snap.empty) return null;
            var d = snap.docs[0];
            var data = d.data();
            return { id: d.id, slug: data.slug || slug, displayName: data.displayName, logoUrl: data.logoUrl, tagline: data.tagline,
              backgroundColor: data.backgroundColor, cardSurfaceColor: data.cardSurfaceColor, textColor: data.textColor,
              primaryColor: data.primaryColor, formSchema: data.formSchema, showContactOnPage: data.showContactOnPage,
              contactPhone: data.contactPhone, contactEmail: data.contactEmail, isActive: data.isActive,
              backgroundPattern: data.backgroundPattern, backgroundPatternColor: data.backgroundPatternColor, backgroundPatternOpacity: data.backgroundPatternOpacity };
          });
      }
      function loadServices(tid) {
        return db.collection('tenants').doc(tid).collection('services').get()
          .then(function(snap){
            return snap.docs.filter(function(d){ return d.data().isActive !== false; }).map(function(d){
              var x = d.data();
              return { id: d.id, slug: x.slug, name: x.name };
            });
          });
      }

      function init() {
        var p = parsePath();
        if (!p.tenantSlug) {
          document.getElementById('root').innerHTML = '<div class="container"><div class="card"><h1>GetBookKing</h1><p>Enter your booking link to get started.</p></div></div>';
          return;
        }
        loadTenant(p.tenantSlug).then(function(tenant){
          if (!tenant) {
            document.getElementById('root').innerHTML = '<div class="container">'+err('Business not found')+'</div>';
            return;
          }
          if (tenant.isActive === false) {
            document.getElementById('root').innerHTML = '<div class="container">'+err('This business is not accepting bookings right now.')+'</div>';
            return;
          }
          applyBranding(tenant);
          return loadServices(tenant.id).then(function(services){
            if (services.length === 0) {
              document.getElementById('root').innerHTML = '<div class="container"><div class="card"><h1>'+esc(tenant.displayName||'Book')+'</h1><p>No services available yet.</p></div></div>';
              applyBranding(tenant);
              return;
            }
            var presel = p.serviceSlug ? services.filter(function(s){ return s.slug === p.serviceSlug; })[0] : null;
            var showForm = p.serviceSlug && presel;
            document.getElementById('root').innerHTML = '<div class="container">' + (showForm ? form(tenant, services, presel) : list(tenant, services)) + '</div>';
            applyBranding(tenant);
            if (showForm) {
              function uploadId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                  var r = Math.random()*16|0, v = c === 'x' ? r : (r&0x3|0x8);
                  return v.toString(16);
                });
              }
              function uploadFileFields(fm, tenantId, formResponses) {
                var fileInputs = fm.querySelectorAll('input[data-type="file"]');
                var fieldPromises = [];
                for (var fi = 0; fi < fileInputs.length; fi++) {
                  var inp = fileInputs[fi];
                  var key = inp.getAttribute('data-key');
                  if (!key || !inp.files || inp.files.length === 0) continue;
                  var uid = uploadId();
                  var pathBase = 'tenantRefImages/' + tenantId + '/' + uid + '/';
                  var uploads = [];
                  for (var j = 0; j < inp.files.length; j++) {
                    var file = inp.files[j];
                    var safeName = (file.name || 'image').replace(/[^a-zA-Z0-9._-]/g, '_');
                    var ref = storage.ref(pathBase + safeName);
                    uploads.push(ref.put(file).then(function(snapshot) { return snapshot.ref.getDownloadURL(); }));
                  }
                  fieldPromises.push(Promise.all(uploads).then(function(urls) {
                    formResponses[key] = urls;
                    return urls;
                  }));
                }
                if (fieldPromises.length === 0) return Promise.resolve(formResponses);
                return Promise.all(fieldPromises).then(function() { return formResponses; });
              }
              var fm = document.getElementById('book-form');
              fm.addEventListener('submit', function(ev){
                ev.preventDefault();
                var errEl = document.getElementById('form-error');
                errEl.style.display = 'none';
                var btn = fm.querySelector('button[type="submit"]');
                btn.disabled = true;
                var origText = btn.textContent;
                btn.textContent = 'Uploading…';
                var formResponses = {};
                [].forEach.call(fm.querySelectorAll('[data-key]'), function(el){
                  if (el.getAttribute('data-type') === 'file') return;
                  var k = el.getAttribute('data-key');
                  var v = (el.value||'').trim();
                  if (k) formResponses[k] = v || null;
                });
                uploadFileFields(fm, tenant.id, formResponses).then(function() {
                  btn.textContent = 'Submitting…';
                  var customerName = formResponses.name || '';
                  var customerEmail = (formResponses.email||'').toLowerCase();
                  var customerPhone = formResponses.phone || null;
                  var serviceId = null, serviceSlugVal = null, serviceName = null;
                  var sel = fm.querySelector('[data-key="service"]');
                  if (sel && sel.options && sel.options[sel.selectedIndex]) {
                    var opt = sel.options[sel.selectedIndex];
                    serviceId = opt.value;
                    serviceSlugVal = opt.dataset.slug || null;
                    serviceName = opt.dataset.name || null;
                  }
                  return functions.httpsCallable('createBookingRequestFromWeb')({
                    tenantSlug: tenant.slug,
                    customerName: customerName,
                    customerEmail: customerEmail,
                    customerPhone: customerPhone,
                    serviceId: serviceId,
                    serviceSlug: serviceSlugVal,
                    serviceName: serviceName,
                    preferredTime: formResponses.preferredTime || null,
                    notes: formResponses.notes || null,
                    formResponses: formResponses
                  });
                }).then(function(){
                  document.getElementById('root').innerHTML = '<div class="container">'+success()+'</div>';
                  applyBranding(tenant);
                }).catch(function(e){
                  errEl.textContent = (e && e.message) ? e.message : 'Something went wrong. Please try again.';
                  errEl.style.display = 'block';
                  btn.disabled = false;
                  btn.textContent = origText;
                });
              });
            }
          });
        }).catch(function(e){
          console.error(e);
          document.getElementById('root').innerHTML = '<div class="container">'+err(e && e.message ? e.message : 'Failed to load.')+'</div>';
        });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  </script>
</body>
</html>
