<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book an appointment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@400;600;700&family=Oswald:wght@400;500;600;700&family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Teko:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&family=Poiret+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;700;900&family=DM+Serif+Display:ital@0;1&family=Syne:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <style>
    @font-face {
      font-family: 'Foglihten No06';
      src: url('/fonts/FoglihtenNo06.woff2') format('woff2'),
           url('/fonts/FoglihtenNo06.woff') format('woff');
      font-display: swap;
    }
    @font-face {
      font-family: 'Butler';
      src: url('/fonts/Butler-Regular.woff2') format('woff2'),
           url('/fonts/Butler-Regular.woff') format('woff');
      font-display: swap;
    }
    :root {
      /* UI: sidebar, body, forms, section titles (Inter). Hero headline uses --font-hero; template picks the stack. */
      --font-display: 'Inter', system-ui, sans-serif;
      --font-hero: 'Kanit', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-display);
      min-height: 100vh;
      color: #333;
      background: #f5f5f5;
      background-size: auto;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 24px; min-height: 100vh; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .logo { max-height: 120px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .tagline { font-size: 14px; color: #666; margin-bottom: 36px; }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .card-header .logo {
      width: 112px;
      height: 112px;
      max-height: none;
      object-fit: cover;
      flex-shrink: 0;
      margin: 0;
      border-radius: 8px;
    }
    .card-header-text { flex: 1; min-width: 0; }
    .card-header-text h1 { font-size: 24px; margin: 0 0 6px; }
    .card-header-text .tagline { font-size: 14px; color: #666; margin: 0; }
    .service-list { list-style: none; padding: 0; margin: 0; margin-top: 8px; }
    .service-item {
      display: block;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: #f0f0f0;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      font-weight: 500;
      transition: background 0.2s;
    }
    .service-item:hover { background: #e5e5e5; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type="file"] { padding: 8px; font-size: 14px; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link {
      display: inline-block;
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    .error { color: #c00; font-size: 14px; margin-bottom: 16px; }
    .success { color: #22c55e; font-size: 16px; font-weight: 500; text-align: center; padding: 24px; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .hero-page { min-height: 100vh; display: flex; flex-direction: column; }
    .hero-section {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-size: cover; background-position: center; background-color: #111;
    }
    .hero-overlay {
      text-align: center; padding: 24px; max-width: 480px;
    }
    .hero-title { font-family: var(--font-hero); font-size: 2.5rem; font-weight: 600; color: #fff; margin: 0 0 32px; letter-spacing: 0.02em; }
    .btn-book-now {
      display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 600;
      background: #fff; color: #111; border: none; border-radius: 8px; text-decoration: none;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-book-now:hover { opacity: 0.9; }
    .featured-work { padding: 48px 24px; background: #f5f5f5; }
    .featured-work h2 { font-size: 1.5rem; margin: 0 0 24px; text-align: center; }
    .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; max-width: 800px; margin: 0 auto; }
    .featured-grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; display: block; }
    /* Booking form shell – light page, white card */
    .booking-shell {
      min-height: 100vh;
      background: #000;
      padding: 84px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .booking-card {
      width: 100%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    }
    @media (min-width: 768px) {
      .booking-card {
        padding: 32px 40px;
        border-radius: 24px;
      }
    }
    .booking-heading {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 12px;
    }
    /* Gallery-style header for booking (matches tattoo gallery title) */
    .booking-page-header {
      width: 100%;
      text-align: center;
      margin: 0 0 28px;
    }
    .booking-page-title {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      margin: 0;
    }
    .booking-page-subtitle {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.65);
    }
    .booking-tagline {
      font-size: 0.95rem;
      color: #4b5563;
      margin: 0 0 20px;
    }
    .booking-form label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #111827;
    }
    .booking-form input,
    .booking-form textarea,
    .booking-form select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      font-size: 0.95rem;
      margin-bottom: 14px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .booking-form input:focus,
    .booking-form textarea:focus,
    .booking-form select:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(248,113,113,0.2);
    }
    /* Client-facing upload dropzone (reference images / PDFs) */
    .upload-drop {
      width: 100%;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 2px dashed rgba(239, 68, 68, 0.35);
      background: rgba(17, 24, 39, 0.03);
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.12s ease;
    }
    .upload-drop:hover {
      border-color: rgba(239, 68, 68, 0.65);
      transform: translateY(-1px);
    }
    .upload-drop.dragover {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.2);
      background: rgba(239, 68, 68, 0.06);
    }
    .upload-drop-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    .upload-drop-inner { display: flex; flex-direction: column; gap: 6px; }
    .upload-drop-title {
      font-weight: 800;
      color: #111827;
      font-size: 0.95rem;
      margin: 0;
    }
    .upload-drop-sub {
      color: rgba(17, 24, 39, 0.65);
      font-size: 0.85rem;
      margin: 0;
    }
    .upload-drop-filelist {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #6b7280;
      word-break: break-all;
    }
    /* Preferred days dropdown (multi-select) */
    .pref-days-dropdown {
      width: 100%;
      margin-bottom: 14px;
      position: relative;
    }
    .pref-days-button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      color: #111827;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      user-select: none;
    }
    .pref-days-button:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.2);
    }
    .pref-days-summary {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pref-days-caret { color: #6b7280; }
    .pref-days-menu {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      z-index: 30;
      max-height: 240px;
      overflow: auto;
    }
    .pref-days-menu.open { display: block; }
    .pref-days-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      color: #111827;
      text-align: left;
    }
    .pref-days-option:hover { background: rgba(239, 68, 68, 0.08); }
    .pref-days-option.active { background: rgba(239, 68, 68, 0.12); }
    .pref-days-check {
      width: 18px;
      color: transparent;
      font-weight: 900;
    }
    .pref-days-option.active .pref-days-check { color: #ef4444; }
    .booking-submit {
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: none;
      font-weight: 800;
      font-size: 1.05rem;
      background: #111827;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(0,0,0,0.5);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .booking-submit:hover {
      background: #000;
      transform: translateY(-1px);
      box-shadow: 0 22px 50px rgba(0,0,0,0.65);
    }
    .booking-submit:disabled {
      opacity: 0.7;
      cursor: default;
      transform: none;
      box-shadow: none;
    }
    /* Force black submit button on white booking background */
    .booking-shell .booking-submit {
      background: #000 !important;
      color: #fff !important;
    }
    .about-artist { padding: 48px 24px; max-width: 560px; margin: 0 auto; }
    .about-artist h2 { font-size: 1.5rem; margin: 0 0 16px; }
    .about-artist p { margin: 0; line-height: 1.6; color: #444; }
    /* Tattoo layout: Inter for UI/sidebar; template hero stack on .tattoo-hero-title via --font-hero */
    .tattoo-page { min-height: 100vh; background: #fff; color: #111; font-family: var(--font-display); }
    /* Booking /book: .booking-shell was #000 — let themed .tattoo-page bg show; card stays white */
    .tattoo-page .booking-shell {
      background: transparent;
      color: inherit;
    }
    .tattoo-page .booking-page-title {
      color: inherit;
    }
    .tattoo-page .booking-page-subtitle {
      color: inherit;
      opacity: 0.65;
    }
    .tattoo-page .booking-card {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }
    .booking-success-card {
      text-align: center;
      padding: 12px 8px 8px;
    }
    .booking-success-lead {
      color: #15803d;
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }
    .booking-success-detail {
      color: #4b5563;
      font-size: 1.05rem;
      line-height: 1.55;
      margin: 0;
    }
    .booking-success-generic {
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 24px 48px;
    }
    .booking-success-brand {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin: 0 0 24px;
      color: #111827;
      letter-spacing: -0.02em;
    }
    /* Tattoo /book thank-you: no white card — copy sits on themed page bg */
    .tattoo-page .booking-success-flat {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 8px 16px 48px;
      text-align: center;
      background: transparent;
      box-shadow: none;
    }
    .tattoo-page .booking-success-flat .booking-success-lead,
    .tattoo-page .booking-success-flat .booking-success-detail {
      color: #111111;
    }
    .tattoo-hero-wrap { position: relative; width: 100%; }
    .tattoo-nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      background: none;
    }
    .tattoo-nav-trailing {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .tattoo-nav .tattoo-brand {
      font-family: var(--font-hero);
      font-weight: 700;
      font-size: 1.25rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .tattoo-nav-links { display: flex; align-items: center; gap: 28px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; }
    .tattoo-nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; font-weight: 500; }
    .tattoo-nav-links a:hover { color: #fff; }
    .tattoo-nav-menu { background: none; border: none; color: #fff; font-size: 1.5rem; padding: 8px; cursor: pointer; line-height: 1; flex-shrink: 0; }
    .tattoo-nav .tattoo-nav-menu { display: none; }
    .tattoo-hero-section {
      min-height: 60vh; display: flex; align-items: center; justify-content: center;
      background-size: cover; background-position: center; background-color: #111;
      padding: 24px;
    }
    .tattoo-shell { max-width: 1400px; margin: 0 auto; padding: 0 32px 64px; }
    /* Sidebar: works on all screen sizes */
    .tattoo-sidebar { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
    .tattoo-sidebar.tattoo-sidebar-open { pointer-events: auto; }
    .tattoo-sidebar-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.25s; }
    .tattoo-sidebar-open .tattoo-sidebar-backdrop { opacity: 1; }
    .tattoo-sidebar-panel { position: absolute; top: 0; right: 0; bottom: 0; left: auto; width: 320px; max-width: 85vw; box-shadow: -2px 0 16px rgba(0,0,0,0.18); transform: translateX(100%); transition: transform 0.25s; padding: 32px 24px; }
    .tattoo-sidebar-open .tattoo-sidebar-panel { transform: translateX(0); }
    /* All templates use right-side drawer (default sidebar rules). */
    /* Wordmark: same hero font as home; logoUrl stays profile/settings-only */
    .tattoo-sidebar-brand {
      margin: 0 0 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(127,127,127,0.35);
    }
    .tattoo-sidebar-brand-title {
      font-family: var(--font-hero);
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin: 0;
      color: inherit;
    }
    .tattoo-sidebar-panel a { display: block; padding: 16px 0; font-size: 20px; color: inherit; opacity: 0.92; text-decoration: none; border-bottom: 1px solid rgba(127,127,127,0.35); }
    .tattoo-sidebar-panel a:last-child { border-bottom: none; }
    @media (max-width: 768px) {
      .tattoo-nav { padding: 14px 20px; }
      .tattoo-nav-links { display: none; }
      .tattoo-nav .tattoo-nav-menu { display: block !important; }
    }
    .tattoo-hero-overlay { text-align: center; padding: 24px; max-width: 480px; }
    .tattoo-hero-title { font-family: var(--font-hero); font-size: 2.25rem; font-weight: 600; color: #fff; margin: 0 0 24px; letter-spacing: 0.02em; }
    .tattoo-btn-book { display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 600; background: #fff; color: #111; border-radius: 8px; text-decoration: none; }
    .tattoo-btn-book:hover { opacity: 0.92; }
    /* Full-bleed band; inner constrains content like .tattoo-shell */
    .tattoo-featured-outer {
      width: 100%;
      box-sizing: border-box;
    }
    .tattoo-featured-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 32px 56px;
      box-sizing: border-box;
    }
    .tattoo-featured-inner h2 { font-size: 1.5rem; margin: 0 0 8px; font-weight: 600; color: inherit; }
    .tattoo-featured-sub { font-size: 14px; color: inherit; opacity: 0.65; margin: 0 0 24px; }
    .tattoo-featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .tattoo-featured-grid img { width: 100%; height: 400px; object-fit: cover; border-radius: 12px; display: block; }
    .tattoo-featured-placeholder {
      grid-column: 1 / -1; padding: 48px 24px; text-align: center; color: inherit; opacity: 0.55;
      font-size: 14px; background: rgba(0,0,0,0.04); border-radius: 12px; border: 1px dashed rgba(0,0,0,0.12);
    }
    .tattoo-gallery-link { display: inline-block; margin-top: 20px; font-size: 14px; color: inherit; opacity: 0.85; font-weight: 500; text-decoration: none; }
    .tattoo-gallery-link:hover { text-decoration: underline; }
    @media (max-width: 640px) {
      .tattoo-featured-inner { padding-left: 20px; padding-right: 20px; }
      .tattoo-featured-grid { grid-template-columns: repeat(2, 1fr); }
      .tattoo-featured-grid img { height: 180px; }
      .tattoo-hero-section { min-height: 55vh; }
      .booking-page-title { font-size: 2rem; }
      .booking-shell { padding-top: 72px; }
    }
    .tattoo-about { padding: 64px 24px; background: #111; color: #fff; text-align: center; }
    .tattoo-about-inner { max-width: 640px; margin: 0 auto; }
    .tattoo-about h2 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 700; margin: 0 0 24px; color: inherit; letter-spacing: 0.02em; }
    .tattoo-about-bio { margin: 0 0 48px; line-height: 1.75; color: inherit; opacity: 0.8; font-size: 1rem; }
    .tattoo-contact-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; padding: 0; border: none; }
    .tattoo-contact-item { text-align: center; }
    .tattoo-contact-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .tattoo-contact-icon svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .tattoo-contact-item h3 { font-size: 15px; font-weight: 600; color: inherit; text-transform: none; letter-spacing: 0; margin: 0 0 8px; }
    .tattoo-contact-item p { margin: 0; font-size: 14px; color: inherit; opacity: 0.7; line-height: 1.6; }
    .tattoo-contact-item a { color: inherit; opacity: 0.75; text-decoration: none; }
    .tattoo-contact-item a:hover { opacity: 1; text-decoration: underline; }
    .tattoo-contact-placeholder { color: inherit; opacity: 0.4; font-style: italic; }
    @media (max-width: 640px) { .tattoo-contact-strip { grid-template-columns: 1fr; gap: 24px; } .tattoo-about h2 { font-size: 1.8rem; } }
    /* ─── Classic redesign (warm cream, split hero, services, stats) ─── */
    .classic-home {
      background: #F7F5F0;
      color: #1a1a1a;
      font-family: var(--font-display);
      min-height: 100vh;
    }
    .classic-home .booking-shell {
      padding-top: 24px;
      justify-content: flex-start;
    }
    .classic-home .tattoo-nav {
      position: relative;
      background: #F7F5F0;

    /* ─── Studio 12 (studio-12-v1) — scoped under .studio12-page; keep in sync with css/studio12-theme.css ─── */

    .studio12-page {
      --s12-ivory: #faf7f2;
      --s12-warm-white: #f5f0e8;
      --s12-blush: #e8d5c4;
      --s12-blush-dark: #d4b8a0;
      --s12-clay: #b08060;
      --s12-clay-dark: #8a6040;
      --s12-espresso: #2a1f18;
      --s12-espresso-mid: #3d2e24;
      --s12-taupe: #8a7a6e;
      --s12-taupe-light: #b0a090;
      --s12-line: rgba(176, 128, 96, 0.18);
      --s12-line-soft: rgba(176, 128, 96, 0.1);
      background: var(--s12-ivory);
      color: var(--s12-espresso);
      font-family: "Jost", system-ui, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      scroll-behavior: smooth;

    .studio12-page *,
    .studio12-page *::before,
    .studio12-page *::after {
      box-sizing: border-box;
    }

    .studio12-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 2;
      opacity: 0.5;
    }

    .studio12-page .s12-topnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      transition: background 0.35s, padding 0.35s, box-shadow 0.35s;
      flex-wrap: wrap;
      gap: 16px;

    (function() {

      /** Supports both subdomain routes (`{tenant}.getbookking.com/home`) and legacy path routes (`/tenant/home`). */
      function parsePath() {
        var path = (location.pathname || '').replace(/^\/+|\/+$/g, '');
        var parts = path ? path.split('/') : [];
        var host = (location.hostname || '').toLowerCase();
        var hostTenant = '';
        if (host.endsWith('.getbookking.com') && host !== 'getbookking.com' && host !== 'www.getbookking.com') {
          hostTenant = host.split('.')[0] || '';
        }

        var tenantSlug = '';
        var page = 'home';
        if (hostTenant) {
          tenantSlug = hostTenant.toLowerCase();
          page = (parts[0] || 'home').toLowerCase();
        } else {
          tenantSlug = (parts[0] || '').toLowerCase();
          page = (parts[1] || 'home').toLowerCase();
        }
        if (!page) page = 'home';
        if (page === tenantSlug) page = 'home';

        var isBookPath = page === 'book';
        var isGalleryPath = page === 'gallery';
        var isShopPath = page === 'shop';
        var isAboutPath = page === 'about';
        var serviceSlugIndex = hostTenant ? 1 : 2;
        var serviceSlug = isBookPath && parts[serviceSlugIndex] ? String(parts[serviceSlugIndex]).toLowerCase() : '';
        var sectionTarget = isShopPath ? 'shop' : (isAboutPath ? 'about' : '');
        return {
          tenantSlug: tenantSlug,
          page: page,
          serviceSlug: serviceSlug,
          isBookPath: isBookPath,
          isGalleryPath: isGalleryPath,
          isShopPath: isShopPath,
          isAboutPath: isAboutPath,
          sectionTarget: sectionTarget,
          isSubdomainRoute: !!hostTenant
        };
      }
      function tenantBaseUrl(tenant) {
        var slug = (tenant && tenant.slug ? String(tenant.slug) : '').toLowerCase();
        if (!slug) return location.origin;
        var host = (location.hostname || '').toLowerCase();
        var protocol = location.protocol || 'https:';
        if (host === slug + '.getbookking.com') return location.origin;
        if (host === 'getbookking.com' || host === 'www.getbookking.com' || host.endsWith('.getbookking.com')) {
          return protocol + '//' + slug + '.getbookking.com';
        }
        return location.origin + '/' + slug;

      /** Matches `WebTheme` in the app; invalid or missing ids fall back per industry. */
      function resolvedWebThemeId(tenant) {
        var ind = String(tenant.industry || '').trim();
        var stored = String(tenant.webThemeId || '').trim();
        var universal = ['luxe-v1', 'blade-v1', 'stonecut-v1', 'studio-12-v1'];

        var map = {
          'hair': ['hair-salon-v1'],

          'tattoos': ['tattoo-studio-v1'],
          'nails': ['nail-salon-v1'],

        return list[0];

      function sidebarLinksHtml(tenant, base, bookUrl) {
        var galleryUrl = base + '/gallery';
        var links = tenant.sidebarLinks;
        if (!Array.isArray(links)) links = [];
        if (!links.length) {
          links = [{ label: 'Home', type: 'internal', target: 'home' }];
          if (tenantShowGalleryPage(tenant)) links.push({ label: 'Gallery', type: 'internal', target: 'gallery' });
          if (tenantShowBookPage(tenant)) links.push({ label: 'Book', type: 'internal', target: 'book' });
          if (tenantShowShopPage(tenant)) links.push({ label: 'Shop', type: 'internal', target: 'shop' });
          if (tenantShowAboutPage(tenant)) links.push({ label: 'About', type: 'internal', target: 'about' });
        } else {
          links = links.slice();
          if (tenantShowGalleryPage(tenant) && !links.some(function(l){ return l && l.target === 'gallery'; })) {
            var insertAt = 0;
            for (var i = 0; i < links.length; i++) {
              if (links[i] && links[i].target === 'home') { insertAt = i + 1; break; }
            }
            links.splice(insertAt, 0, { label: 'Gallery', type: 'internal', target: 'gallery' });
          }
          links = filterSidebarLinksForPageVisibility(tenant, links);
        }
        return links.map(function(l) {
          var href;
          if (l.type === 'external' && l.url) {
            href = l.url;
          } else if (l.target === 'book') {
            href = bookUrl;
          } else if (l.target === 'gallery') {
            href = galleryUrl;
          } else if (l.target === 'shop') {
            href = base + '/shop';
          } else if (l.target === 'about') {
            href = base + '/about';
          } else {
            href = base + '/home';
          }
          return '<a href="'+esc(href)+'">'+esc(l.label || '')+'</a>';

      var STUDIO12_MIDDLE_DOT_SEP = ' · ';

      /** Split on ` · ` into exactly `count` segments (extra dots merge into the last segment). */
      function studio12SplitMiddleDot(raw, count) {
        var s = String(raw || '').trim();
        if (!s) {
          var empty = [];
          for (var z = 0; z < count; z++) empty.push('');
          return empty;
        }
        var parts = s.split(STUDIO12_MIDDLE_DOT_SEP).map(function(p) { return p.trim(); });
        while (parts.length < count) parts.push('');
        if (parts.length > count) {
          var tail = parts.slice(count - 1).join(STUDIO12_MIDDLE_DOT_SEP);
          parts = parts.slice(0, count - 1).concat([tail]);
        }
        return parts;
      }

      /** Prefer break after “… that …”; else split on a space near the middle. */
      function studio12SplitHeroHeadline(raw) {
        var s = String(raw || '').trim();
        if (!s) return { line1: '', line2: '' };
        var m = s.match(/^(.+?)\s+that\s+(.+)$/i);
        if (m) {
          return { line1: (m[1].trim() + ' that'), line2: m[2].trim() };
        }
        var mid = Math.floor(s.length / 2);
        var left = s.lastIndexOf(' ', mid);
        var right = s.indexOf(' ', mid);
        var breakAt = -1;
        if (left < 0) breakAt = right;
        else if (right < 0) breakAt = left;
        else breakAt = (mid - left <= right - mid) ? left : right;
        if (breakAt <= 0 || breakAt >= s.length - 1) {
          return { line1: s, line2: '' };
        }
        return { line1: s.slice(0, breakAt).trim(), line2: s.slice(breakAt + 1).trim() };
      }

      function loadProducts(tid) {
        return db.collection('tenants').doc(tid).collection('products').get()
          .then(function(snap){
            return snap.docs.filter(function(d){ return d.data().isActive !== false; }).map(function(d){
              var x = d.data();
              return { id: d.id, name: x.name || '', category: x.category || '', price: x.price || 0, salePrice: x.salePrice || null, imageUrl: x.imageUrl || '' };
            });
          });
      }
      function loadServices(tid) {
        return db.collection('tenants').doc(tid).collection('services').get()
          .then(function(snap){
            var list = snap.docs.filter(function(d){ return d.data().isActive !== false; }).map(function(d){
              var x = d.data();
              var pr = x.price;
              var so = x.sortOrder;
              var priceNum = (typeof pr === 'number' && !isNaN(pr)) ? pr : null;
              if (priceNum == null && pr != null && String(pr).trim() !== '') {
                var parsed = parseFloat(String(pr));
                if (!isNaN(parsed) && parsed > 0) priceNum = parsed;
              }
              return {
                id: d.id,
                slug: x.slug,
                name: x.name,
                description: (x.description != null ? String(x.description) : '') || '',
                price: priceNum,
                imageUrl: x.imageUrl || '',
                sortOrder: (typeof so === 'number' && !isNaN(so)) ? so : 1e9
              };
            });
            list.sort(function(a, b){
              if (a.sortOrder !== b.sortOrder) return a.sortOrder - b.sortOrder;
              return (a.name || '').localeCompare(b.name || '');
            });
            return list;
          });
      }

                      var file = inp.files[j];
                      var safeName = (file.name || 'image').replace(/[^a-zA-Z0-9._-]/g, '_');
                      var ref = storage.ref(pathBase + safeName);
                      uploads.push(ref.put(file).then(function(snapshot) { return snapshot.ref.getDownloadURL(); }));
                    }
                    fieldPromises.push(Promise.all(uploads).then(function(urls) {
                      formResponses[key] = urls;
                      return urls;
                    }));
                  }
                  if (fieldPromises.length === 0) return Promise.resolve(formResponses);
                  return Promise.all(fieldPromises).then(function() { return formResponses; });
                }

                function isAllowedFile(file) {
                  var t = (file && file.type) || '';
                  if (t.indexOf('image/') === 0) return true;
                  if (t === 'application/pdf') return true;
                  var n = (file && file.name) || '';
                  return /\.pdf$/i.test(n);
                }
                var dropzones = fm.querySelectorAll('.upload-drop[data-reference-images-drop]');
                for (var i = 0; i < dropzones.length; i++) {
                  (function(dz){
                    var input = dz.querySelector('input[type="file"]');
                    var listEl = dz.querySelector('[data-upload-filelist]');
                    if (!input) return;
                    function refreshList() {
                      if (listEl) listEl.textContent = fileListText(input.files) ? ('Selected: ' + fileListText(input.files)) : '';
                    }
                    input.addEventListener('change', refreshList);
                    dz.addEventListener('click', function(e){
                      if (e.target === input) return;
                      input.click();
                    });
                    dz.addEventListener('keydown', function(e){
                      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
                    });
                    ['dragenter','dragover'].forEach(function(ev){
                      dz.addEventListener(ev, function(e){
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.add('dragover');
                      });
                    });
                    ['dragleave','drop'].forEach(function(ev){
                      dz.addEventListener(ev, function(e){
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.remove('dragover');
                      });
                    });
                    dz.addEventListener('drop', function(e){
                      var files = e.dataTransfer && e.dataTransfer.files;
                      if (!files || !files.length) return;
                      var dt = new DataTransfer();
                      for (var j = 0; j < files.length; j++) {
                        if (isAllowedFile(files[j])) dt.items.add(files[j]);
                      }
                      if (dt.files.length) {
                        input.files = dt.files;
                        refreshList();
                      }
                    });
                  })(dropzones[i]);
                }
              }
              function setupPreferredDaysDropdown(fm) {
                var groups = fm.querySelectorAll('[data-pref-days-dropdown]');
                for (var gi = 0; gi < groups.length; gi++) {
                  (function(group){
                    var button = group.querySelector('[data-pref-days-button]');
                    var menu = group.querySelector('[data-pref-days-menu]');
                    var summary = group.querySelector('[data-pref-days-summary]');
                    var hidden = group.querySelector('[data-preferred-days-hidden]');
                    var options = group.querySelectorAll('[data-pref-day]');

                    if (!button || !menu || !summary || !hidden || !options || !options.length) return;

                    function selectedFromHidden() {
                      var val = hidden.value || '';
                      return val ? val.split(',').map(function(x){ return x.trim(); }).filter(Boolean) : [];
                    }

                    function updateUI(selected) {
                      for (var oi = 0; oi < options.length; oi++) {
                        var opt = options[oi];
                        var day = opt.getAttribute('data-pref-day');
                        var isActive = selected.indexOf(day) >= 0;
                        opt.classList.toggle('active', isActive);
                        opt.setAttribute('aria-selected', isActive ? 'true' : 'false');
                      }

                      if (!selected.length) {
                        summary.textContent = 'Preferred days';
                      } else {
                        // Always show the chosen days (even for 3+ selections).
                        summary.textContent = selected.join(', ');
                      }
                    }

                    function toggleMenu(open) {
                      var shouldOpen = (typeof open === 'boolean') ? open : !menu.classList.contains('open');
                      if (shouldOpen) menu.classList.add('open');
                      else menu.classList.remove('open');
                      button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
                    }

                    function toggleDay(day) {
                      var selected = selectedFromHidden();
                      var idx = selected.indexOf(day);
                      if (idx >= 0) selected.splice(idx, 1);
                      else selected.push(day);
                      hidden.value = selected.join(',');
                      updateUI(selected);
                    }

                    // Initialize UI from current hidden value
                    updateUI(selectedFromHidden());

                    button.addEventListener('click', function(e){
                      e.preventDefault();
                      e.stopPropagation();
                      toggleMenu();
                    });

                    for (var oi = 0; oi < options.length; oi++) {
                      (function(opt){
                        var day = opt.getAttribute('data-pref-day');
                        opt.addEventListener('click', function(e){
                          e.preventDefault();
                          e.stopPropagation();
                          toggleDay(day);
                        });
                      })(options[oi]);
                    }

                    document.addEventListener('click', function(ev){
                      if (!group.contains(ev.target)) {
                        menu.classList.remove('open');
                        button.setAttribute('aria-expanded', 'false');
                      }
                    });
                  })(groups[gi]);
                }
              }
              var fm = document.getElementById('book-form');
              if (fm) {
              setupDropzones(fm);
              setupPreferredDaysDropdown(fm);
              fm.addEventListener('submit', function(ev){
                ev.preventDefault();
                var errEl = document.getElementById('form-error');
                errEl.style.display = 'none';
                var btn = fm.querySelector('button[type="submit"]');
                btn.disabled = true;
                var origText = btn.textContent;
                btn.textContent = 'Uploading…';
                var formResponses = {};
                [].forEach.call(fm.querySelectorAll('[data-key]'), function(el){
                  if (el.getAttribute('data-type') === 'file') return;
                  var k = el.getAttribute('data-key');
                  var v = (el.value||'').trim();
                  if (k) formResponses[k] = v || null;
                });
                uploadFileFields(fm, tenant.id, formResponses).then(function() {
                  btn.textContent = 'Submitting…';
                  var customerName = formResponses.name || '';
                  function normalizeEmail(v) {
                    return (v || '').toString().trim().toLowerCase().replace(/\s+/g, '');
                  }
                  function normalizePhone(raw) {
                    var s = (raw || '').toString().trim();
                    if (!s) return null;

                    var hasPlus = s.charAt(0) === '+';
                    var digits = s.replace(/\D/g, '');
                    if (!digits) return null;

                    function formatUS10(d10) {
                      return '(' + d10.slice(0,3) + ') ' + d10.slice(3,6) + ' - ' + d10.slice(6,10);
                    }

                    // US +1 or 10-digit formats
                    if (digits.length === 10) return formatUS10(digits);
                    if (digits.length === 11 && digits.charAt(0) === '1') return formatUS10(digits.slice(1));

                    // If user entered +<country>, preserve best-effort with +
                    if (hasPlus) return '+' + digits;

                    // Best-effort for all other countries: prefix + for anything >= 7 digits
                    if (digits.length >= 7) return '+' + digits;

                    // Too short: keep raw digits
                    return digits;
                  }
                  var customerEmail = normalizeEmail(formResponses.email);
                  var customerPhone = normalizePhone(formResponses.phone);
                  var preferredDays = null;
                  if (formResponses.preferredDays) {
                    preferredDays = (formResponses.preferredDays || '')
                      .toString()
                      .split(',')
                      .map(function(x){ return (x||'').trim(); })
                      .filter(Boolean);
                    if (!preferredDays.length) preferredDays = null;
                  }
                  var preferredTime =
                    (formResponses.preferredTime || formResponses.preferredTimeOfDay || '').toString().trim();
                  if (!preferredTime) preferredTime = null;
                  var serviceId = null, serviceSlugVal = null, serviceName = null;
                  var sel = fm.querySelector('[data-key="service"]');
                  if (sel && sel.options && sel.options[sel.selectedIndex]) {
                    var opt = sel.options[sel.selectedIndex];
                    serviceId = opt.value;
                    serviceSlugVal = opt.dataset.slug || null;
                    serviceName = opt.dataset.name || null;
                  }
                  if (!serviceId) {
                    errEl.textContent = 'Please select a service.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = origText;
                    return;
                  }
                  return functions.httpsCallable('createBookingRequestFromWeb')({
                    tenantSlug: tenant.slug,
                    customerName: customerName,
                    customerEmail: customerEmail,
                    customerPhone: customerPhone,
                    serviceId: serviceId,
                    serviceSlug: serviceSlugVal,
                    serviceName: serviceName,
                    preferredTime: preferredTime,
                    preferredDays: preferredDays,
                    notes: formResponses.notes || null,
                    formResponses: formResponses
                  });
                }).then(function(){
                  var doneHtml = bookingSuccessHtml(tenant);
                  document.getElementById('root').innerHTML = usesThemedChrome(tenant) ? doneHtml : '<div class="container">' + doneHtml + '</div>';
                  applyBranding(tenant);
                  if (usesThemedChrome(tenant)) bindTattooSidebar();
                  if (isBladeTheme(tenant)) bindBladeChrome();
                  applySidebarIconColor(tenant, true, false);
                }).catch(function(e){
                  errEl.textContent = (e && e.message) ? e.message : 'Something went wrong. Please try again.';
                  errEl.style.display = 'block';
                  btn.disabled = false;
                  btn.textContent = origText;
                });
              });
              }
            }
          });
        }).catch(function(e){
          console.error(e);
          document.getElementById('root').innerHTML = '<div class="container">'+err(e && e.message ? e.message : 'Failed to load.')+'</div>';
        });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  </script>
</body>
</html>
