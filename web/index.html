<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Book an appointment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@400;600;700&family=Oswald:wght@400;500;600;700&family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Teko:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&family=Poiret+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;700;900&family=DM+Serif+Display:ital@0;1&family=Syne:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <style>
    @font-face {
      font-family: 'Foglihten No06';
      src: url('/fonts/FoglihtenNo06.woff2') format('woff2'),
           url('/fonts/FoglihtenNo06.woff') format('woff');
      font-display: swap;
    }
    @font-face {
      font-family: 'Butler';
      src: url('/fonts/Butler-Regular.woff2') format('woff2'),
           url('/fonts/Butler-Regular.woff') format('woff');
      font-display: swap;
    }
    /* Marketing homepage iframe embed (`?bk_embed=1`) */
    html.bk-marketing-embed .tattoo-sidebar { display: none !important; }
    html.bk-marketing-embed body > footer { display: none !important; }
    html.bk-marketing-embed { overflow-x: hidden; }

    :root {
      /* UI: sidebar, body, forms, section titles (Inter). Hero headline uses --font-hero; template picks the stack. */
      --font-display: 'Inter', system-ui, sans-serif;
      --font-hero: 'Kanit', system-ui, sans-serif;
      /* Tenant palette (set in JS via applyTenantColorVars); defaults match Original presets. */
      --bk-bg: #ffffff;
      --bk-fg: #1a1a1a;
      --bk-card: #f5f5f5;
      --bk-accent: #111111;
      --bk-accent-hover: #333333;
      --bk-accent-fg: #f7f5f0;
      --bk-featured-bg: #ffffff;
      --bk-featured-fg: #1a1a1a;
      --bk-gallery-bg: #ffffff;
      --bk-gallery-fg: #1a1a1a;
      --bk-about-bg: #1a1a1a;
      --bk-about-fg: #f7f5f0;
      /* Empty image slots (set in applyTenantColorVars). Hero uses stronger accent match. */
      --bk-hero-slot-bg: color-mix(in srgb, var(--bk-accent) 48%, var(--bk-bg) 52%);
      --bk-hero-slot-border: 2px dashed var(--bk-accent-55, rgba(17, 17, 17, 0.35));
      --bk-slot-bg: color-mix(in srgb, var(--bk-accent) 32%, var(--bk-card) 68%);
      --bk-slot-border: 2px dashed var(--bk-accent-55, rgba(17, 17, 17, 0.35));
      --bk-slot-border-light: 1px dashed var(--bk-accent-35, rgba(17, 17, 17, 0.12));
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-display);
      min-height: 100vh;
      color: #333;
      background: #f5f5f5;
      background-size: auto;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 24px; min-height: 100vh; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .logo { max-height: 120px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .tagline { font-size: 14px; color: #666; margin-bottom: 36px; }
    .tagline a { color: #444; text-decoration: underline; }
    .tagline a:hover { color: #111; }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .card-header .logo {
      width: 112px;
      height: 112px;
      max-height: none;
      object-fit: cover;
      flex-shrink: 0;
      margin: 0;
      border-radius: 8px;
    }
    .card-header-text { flex: 1; min-width: 0; }
    .card-header-text h1 { font-size: 24px; margin: 0 0 6px; }
    .card-header-text .tagline { font-size: 14px; color: #666; margin: 0; }
    .service-list { list-style: none; padding: 0; margin: 0; margin-top: 8px; }
    .service-item {
      display: block;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: #f0f0f0;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      font-weight: 500;
      transition: background 0.2s;
    }
    .service-item:hover { background: #e5e5e5; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type="file"] { padding: 8px; font-size: 14px; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link {
      display: inline-block;
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    .error { color: #c00; font-size: 14px; margin-bottom: 16px; }
    .booking-sms-consent {
      margin: 12px 0 4px;
      padding: 12px 14px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      background: rgba(0,0,0,0.02);
    }
    .booking-sms-consent-phone {
      margin-bottom: 12px;
    }
    .booking-sms-consent-phone-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #444;
    }
    .booking-sms-consent-phone-input {
      width: 100%;
      font-size: 16px;
      padding: 10px 12px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      background: #fff;
      color: inherit;
    }
    .booking-form--guided .booking-sms-consent-phone-input {
      background: var(--bk-input-bg, #fff);
      border-color: var(--bk-border, rgba(0,0,0,0.12));
      color: var(--bk-fg, inherit);
    }
    .booking-sms-consent-label {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
      line-height: 1.5;
      color: #444;
      cursor: pointer;
    }
    .booking-sms-consent-label input {
      margin-top: 3px;
      flex-shrink: 0;
    }
    .booking-sms-consent-label a { color: inherit; text-decoration: underline; }
    .book-legal-privacy {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .book-legal-privacy:hover { opacity: 0.85; }
    .book-legal-footer {
      margin-top: auto;
      border-top: 1px solid var(--border, #E8E0D4);
    }
    .book-legal-footer .classic-footer-copy { text-align: center; }
    .classic-footer-copy .book-legal-privacy,
    .blade-footer-copy .book-legal-privacy,
    .s12-footer-copy .book-legal-privacy,
    .luxe-footer-copy .book-legal-privacy,
    .stonecut-page > footer .book-legal-privacy {
      color: inherit;
      opacity: 0.85;
    }
    .success { color: #22c55e; font-size: 16px; font-weight: 500; text-align: center; padding: 24px; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .hero-page { min-height: 100vh; display: flex; flex-direction: column; }
    .hero-section {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-size: cover; background-position: center; background-color: #111;
    }
    .hero-overlay {
      text-align: center; padding: 24px; max-width: 480px;
    }
    .hero-title { font-family: var(--font-hero); font-size: 2.5rem; font-weight: 600; color: #fff; margin: 0 0 32px; letter-spacing: 0.02em; }
    .btn-book-now {
      display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 600;
      background: #fff; color: #111; border: none; border-radius: 8px; text-decoration: none;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-book-now:hover { opacity: 0.9; }
    .featured-work { padding: 48px 24px; background: #f5f5f5; }
    .featured-work h2 { font-size: 1.5rem; margin: 0 0 24px; text-align: center; }
    .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; max-width: 800px; margin: 0 auto; }
    /* Match app featured-work export (4:5 portrait) so `cover` does not re-crop. */
    .featured-grid img { width: 100%; aspect-ratio: 4 / 5; height: auto; object-fit: cover; border-radius: 8px; display: block; }
    /* Booking form shell – light page, white card */
    .booking-shell {
      min-height: 100vh;
      background: #000;
      padding: 84px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .booking-card {
      width: 100%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    }
    @media (min-width: 768px) {
      .booking-card {
        padding: 32px 40px;
        border-radius: 24px;
      }
    }
    .booking-heading {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 12px;
    }
    /* Gallery-style header for booking (matches tattoo gallery title) */
    .booking-page-header {
      width: 100%;
      text-align: center;
      margin: 0 0 28px;
    }
    .booking-page-title {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      margin: 0;
    }
    .booking-page-subtitle {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.65);
    }
    .booking-tagline {
      font-size: 0.95rem;
      color: #4b5563;
      margin: 0 0 20px;
    }
    .booking-form label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #111827;
    }
    .booking-form input,
    .booking-form textarea,
    .booking-form select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      font-size: 0.95rem;
      margin-bottom: 14px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .booking-form input:focus,
    .booking-form textarea:focus,
    .booking-form select:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(248,113,113,0.2);
    }
    /* Client-facing upload dropzone (reference images / PDFs) */
    .upload-drop {
      width: 100%;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 2px dashed rgba(239, 68, 68, 0.35);
      background: rgba(17, 24, 39, 0.03);
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.12s ease;
    }
    .upload-drop:hover {
      border-color: rgba(239, 68, 68, 0.65);
      transform: translateY(-1px);
    }
    .upload-drop.dragover {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.2);
      background: rgba(239, 68, 68, 0.06);
    }
    .upload-drop-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    .upload-drop-inner { display: flex; flex-direction: column; gap: 6px; }
    .upload-drop-title {
      font-weight: 800;
      color: #111827;
      font-size: 0.95rem;
      margin: 0;
    }
    .upload-drop-sub {
      color: rgba(17, 24, 39, 0.65);
      font-size: 0.85rem;
      margin: 0;
    }
    .upload-drop-filelist {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #6b7280;
      word-break: break-all;
    }
    /* Preferred days dropdown (multi-select) */
    .pref-days-dropdown {
      width: 100%;
      margin-bottom: 14px;
      position: relative;
    }
    .pref-days-button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      color: #111827;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      user-select: none;
    }
    .pref-days-button:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.2);
    }
    .pref-days-summary {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pref-days-caret { color: #6b7280; }
    .pref-days-menu {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      z-index: 30;
      max-height: 240px;
      overflow: auto;
    }
    .pref-days-menu.open { display: block; }
    .pref-days-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      color: #111827;
      text-align: left;
    }
    .pref-days-option:hover { background: rgba(239, 68, 68, 0.08); }
    .pref-days-option.active { background: rgba(239, 68, 68, 0.12); }
    .pref-days-check {
      width: 18px;
      color: transparent;
      font-weight: 900;
    }
    .pref-days-option.active .pref-days-check { color: #ef4444; }
    .booking-submit {
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: none;
      font-weight: 800;
      font-size: 1.05rem;
      background: #111827;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(0,0,0,0.5);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .booking-submit:hover {
      background: #000;
      transform: translateY(-1px);
      box-shadow: 0 22px 50px rgba(0,0,0,0.65);
    }
    .booking-submit:disabled {
      opacity: 0.7;
      cursor: default;
      transform: none;
      box-shadow: none;
    }
    /* Force black submit button on white booking background (standard layout only) */
    .booking-shell:not(.booking-shell--guided) .booking-submit {
      background: #000 !important;
      color: #fff !important;
    }
    /* Guided booking layout (theme tokens set inline on .booking-shell--guided) */
    .booking-shell--guided {
      padding: 48px 16px 32px;
      align-items: stretch;
      justify-content: flex-start;
    }
    .booking-guided {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      color: var(--bk-fg, inherit);
    }
    .booking-guided-header {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 0.5px solid var(--bk-border, rgba(0,0,0,0.12));
    }
    .booking-guided-eyebrow {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bk-muted, rgba(0,0,0,0.45));
      margin: 0 0 10px;
    }
    .booking-guided-title {
      font-family: var(--font-hero, var(--font-display, inherit));
      font-size: clamp(1.75rem, 5vw, 2rem);
      font-weight: 600;
      line-height: 1.1;
      margin: 0 0 8px;
      color: var(--bk-fg, inherit);
    }
    .booking-guided-sub {
      font-size: 13px;
      line-height: 1.5;
      color: var(--bk-muted, rgba(0,0,0,0.55));
      margin: 0;
    }
    .booking-guided-steps {
      margin-bottom: 20px;
    }
    .booking-guided--steps-first .booking-guided-steps {
      margin-top: 0;
    }
    .booking-guided-step-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .booking-guided-step-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bk-accent, #111);
      color: var(--bk-accent-fg, #fff);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 9px;
      font-weight: 600;
    }
    .booking-guided-step-dot.is-inactive {
      background: var(--bk-surface-2, rgba(0,0,0,0.06));
      color: var(--bk-muted, rgba(0,0,0,0.4));
      border: 0.5px solid var(--bk-border, rgba(0,0,0,0.12));
    }
    .booking-guided-step-line {
      flex: 1;
      height: 0.5px;
      background: var(--bk-border, rgba(0,0,0,0.12));
    }
    .booking-guided-step-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--bk-muted, rgba(0,0,0,0.45));
    }
    .booking-guided-step-labels span.is-active {
      color: var(--bk-fg, inherit);
    }
    .booking-form--guided {
      background: var(--bk-surface, #fff);
      border: 0.5px solid var(--bk-border, rgba(0,0,0,0.1));
      border-radius: 16px;
      padding: 20px 18px 8px;
      box-shadow: 0 12px 40px var(--bk-shadow, rgba(0,0,0,0.08));
    }
    .booking-guided-section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bk-muted, rgba(0,0,0,0.45));
      margin: 0 0 12px;
    }
    .booking-guided-divider {
      height: 0.5px;
      background: var(--bk-border, rgba(0,0,0,0.1));
      margin: 20px 0;
    }
    .booking-guided-service-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 0;
    }
    .booking-guided-service-card {
      border: 0.5px solid var(--bk-border, rgba(0,0,0,0.12));
      border-radius: 12px;
      padding: 14px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--bk-surface-2, rgba(0,0,0,0.02));
      text-align: left;
    }
    .booking-guided-service-card:hover {
      border-color: var(--bk-muted, rgba(0,0,0,0.35));
    }
    .booking-guided-service-card.is-active {
      border-color: var(--bk-accent, #111);
      background: var(--bk-surface-active, rgba(0,0,0,0.04));
    }
    .booking-guided-service-card .name {
      font-size: 13px;
      font-weight: 600;
      color: var(--bk-fg, inherit);
      margin: 0 0 4px;
    }
    .booking-guided-service-card .meta {
      font-size: 11px;
      color: var(--bk-muted, rgba(0,0,0,0.5));
      margin: 0;
    }
    .booking-guided-field-label {
      display: block;
      font-size: 11px;
      color: var(--bk-muted, rgba(0,0,0,0.55));
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    .booking-form--guided .field-input,
    .booking-form--guided input.field-input,
    .booking-form--guided select.field-input,
    .booking-form--guided textarea.field-input {
      width: 100%;
      background: var(--bk-input-bg, rgba(0,0,0,0.04));
      border: 0.5px solid var(--bk-border, rgba(0,0,0,0.12));
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--bk-fg, inherit);
      font-family: inherit;
      margin-bottom: 14px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .booking-form--guided .field-input:focus {
      border-color: var(--bk-accent, #111);
      color: var(--bk-fg, inherit);
    }
    .booking-form--guided select.field-input {

    }
    .stonecut-page .stonecut-shop-inner { text-align: center; }
    .stonecut-page .stonecut-shop-grid {

    .stonecut-page .stonecut-shop-preview .stonecut-shop-grid { margin-top: 28px; }
    .stonecut-page .stonecut-shop-lead {

    .stonecut-page .stonecut-shop-preview { text-align: center; }
    .stonecut-page .stonecut-shop-preview .stonecut-heading { margin-bottom: 12px; }
    .stonecut-page .luxe-product-card img {

    .stonecut-page .luxe-product-placeholder {

    .stonecut-page .luxe-product-category { color: var(--bk-fg-muted, #a09888); }
    .stonecut-page .luxe-product-card h3 { color: #e8e0d0; }
    .stonecut-page .luxe-product-price { color: #e8e0d0; }
    .stonecut-page .luxe-product-price-sale { color: var(--bk-accent, #c0221a); }
    .stonecut-page .luxe-product-price-original { color: #6a6358; }

    @media (max-width: 900px) {

      .stonecut-page .stonecut-shop-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    }

    /* ─── Studio 12 (studio-12-v1) — scoped under .studio12-page; keep in sync with css/studio12-theme.css ─── */

    .studio12-page {
      --s12-ivory: var(--bk-bg, #faf7f2);
      --s12-warm-white: var(--bk-card, #f5f0e8);
      --s12-blush: var(--bk-card, #e8d5c4);
      --s12-blush-dark: var(--bk-accent-hover, #d4b8a0);
      --s12-clay: var(--bk-accent, #b08060);
      --s12-clay-dark: var(--bk-accent-hover, #8a6040);
      --s12-espresso: var(--bk-fg, #2a1f18);
      --s12-espresso-mid: var(--bk-about-bg, #3d2e24);
      --s12-taupe: var(--bk-fg-muted, #8a7a6e);
      --s12-taupe-light: var(--bk-fg-muted-light, #b0a090);
      --s12-line: var(--bk-accent-18, rgba(176, 128, 96, 0.18));
      --s12-line-soft: var(--bk-accent-10, rgba(176, 128, 96, 0.1));
      background: var(--s12-ivory);
      color: var(--s12-espresso);
      font-family: "Jost", system-ui, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .studio12-page *,
    .studio12-page *::before,
    .studio12-page *::after {
      box-sizing: border-box;
    }

    .studio12-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 2;
      opacity: 0.5;
    }

    .studio12-page .s12-topnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: calc(24px + env(safe-area-inset-top, 0px)) 40px 24px 40px;
      transition: background 0.35s, padding 0.35s, box-shadow 0.35s;
      flex-wrap: wrap;
      gap: 16px;
      background: var(--s12-ivory);
      border-bottom: 1px solid var(--s12-line);
      box-shadow: 0 1px 0 rgba(42, 31, 24, 0.04);
    }

    .studio12-page .s12-topnav.scrolled {
      background: color-mix(in srgb, var(--bk-bg, #faf7f2) 98%, transparent);
      backdrop-filter: blur(12px);
      padding: calc(16px + env(safe-area-inset-top, 0px)) 40px 16px 40px;
      border-bottom: 1px solid var(--s12-line);
      box-shadow: 0 10px 36px color-mix(in srgb, var(--bk-fg, #2a1f18) 7%, transparent);
    }

    .studio12-page .s12-nav-logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      text-decoration: none;
      color: inherit;
    }

    .studio12-page .s12-nav-logo-main {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(20px, 4.9vw, 26px);
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--s12-espresso);
    }

    .studio12-page .s12-nav-logo-sub {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--s12-clay);
      margin-top: 4px;
    }

    .studio12-page .s12-nav-links {
      display: flex;
      gap: clamp(16px, 3vw, 40px);
      list-style: none;
      margin: 0;
      padding: 0;
      flex-wrap: wrap;
    }

    .studio12-page .s12-nav-links a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--s12-taupe);
      text-decoration: none;
      transition: color 0.3s;
    }

    .studio12-page .s12-nav-links a:hover {
      color: var(--s12-espresso);
    }

    .studio12-page .s12-nav-book {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--bk-accent-fg, var(--s12-ivory));
      background: var(--bk-accent, var(--s12-espresso));
      border: none;
      padding: 14px 26px;
      text-decoration: none;
      transition: background 0.3s;
      display: inline-block;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .studio12-page .s12-nav-book:hover {
      background: var(--bk-accent-hover, var(--s12-espresso-mid));
    }

    .studio12-page .s12-nav-trailing {
      display: none;
      align-items: center;
      justify-content: flex-end;
      margin-left: auto;
      flex-shrink: 0;
    }
    .studio12-page .s12-topnav .tattoo-nav-menu {
      display: none;
      background: none;
      border: none;
      color: var(--s12-espresso);
      font-size: 1.5rem;
      padding: 8px 10px;
      margin-right: 2px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }

    .studio12-page .s12-hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      padding-top: 0;
    }

    /* Home only: fixed `.s12-topnav` sits over the first paint; subpages use `.studio12-sub { padding-top }` on the root. */
    .studio12-page:not(.studio12-sub) .s12-hero {
      padding-top: calc(clamp(88px, 11vh, 132px) + env(safe-area-inset-top, 0px));
    }

    .studio12-page .s12-hero-img-col {
      position: relative;
      overflow: hidden;
      min-height: 50vh;
    }
    .studio12-page .s12-hero-img-col .bk-hero-image-hit { z-index: 4; }
    /* Studio 12 hero image slot is a fixed 4:5 portrait frame; upload is cropped to 4:5 in-app. */
    /* Studio 12 hero image slot is a fixed 4:5 frame. `align-self:start` prevents CSS Grid
       from stretching the cell past 4:5 so the in-app crop renders pixel-for-pixel. */
    .studio12-page .s12-hero-img-col:has(> img.s12-hero-img) {
      aspect-ratio: 4 / 5;
      min-height: 0;
      align-self: start;
    }

    .studio12-page .s12-hero-img {
      width: 100%;
      height: 100%;
      min-height: 50vh;
      object-fit: cover;
      display: block;
    }
    .studio12-page .s12-hero-img-col:has(> img.s12-hero-img) .s12-hero-img {
      min-height: 0 !important;
    }

    /* Main split hero only: anchor `cover` to the top so heads aren’t clipped by default centering. */
    .studio12-page .s12-hero .s12-hero-img-col > .s12-hero-img {
      object-position: center top;
    }

    /* Studio 12 auxiliary image slots each have a fixed frame; uploads are cropped in-app. */
    .studio12-page .s12-aux-img-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      max-width: 100%;
      aspect-ratio: 4 / 5;
    }
    .studio12-page .s12-philosophy .s12-aux-img-wrap { aspect-ratio: 4 / 5; }
    .studio12-page .s12-book-cta .s12-aux-img-wrap { aspect-ratio: 4 / 3; }
    .studio12-page .s12-aux-img-wrap .s12-hero-img {
      width: 100%;
      height: 100%;
      min-height: 0 !important;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }

    .studio12-page .s12-hero-img-fallback {
      width: 100%;
      height: 100%;
      min-height: 50vh;
      background: var(--bk-hero-slot-bg, color-mix(in srgb, var(--bk-accent) 48%, var(--bk-bg) 52%));
      border: var(--bk-hero-slot-border, 2px dashed var(--bk-accent-55, rgba(26, 26, 26, 0.35)));
      box-sizing: border-box;
      position: relative;
    }

    .studio12-page .s12-hero-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 0%,
        transparent 72%,
        rgba(250, 247, 242, 0.35) 86%,
        var(--s12-ivory) 100%
      );
      pointer-events: none;
    }

    .studio12-page .s12-hero-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 40px 60px 36px;
      position: relative;
    }

    .studio12-page .s12-hero-tag {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--s12-clay);
      margin-bottom: 28px;
    }

    .studio12-page .s12-hero-tag::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--s12-clay);
    }

    .studio12-page .s12-hero-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(48px, 5.8vw, 88px);
      font-weight: 400;
      line-height: 1.05;
      color: var(--s12-espresso);
      margin: 0 0 24px;
    }

    .studio12-page .s12-hero-title em {
      font-style: italic;
      color: var(--s12-clay);
      display: block;
    }

    .studio12-page .s12-hero-sub {
      font-size: 15px;
      line-height: 1.85;
      color: var(--s12-taupe);
      max-width: 380px;
      margin-bottom: 36px;
    }

    .studio12-page .s12-hero-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }

    .studio12-page .s12-btn-dark,
    .studio12-page .s12-btn-outline {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      padding: 18px 40px;
      text-decoration: none;
      transition: background 0.3s, transform 0.3s, border-color 0.3s, color 0.3s;
      display: inline-block;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .studio12-page .s12-btn-dark {
      color: var(--s12-ivory);
      background: var(--s12-espresso);
    }

    .studio12-page .s12-btn-dark:hover {
      background: var(--s12-espresso-mid);
      transform: translateY(-2px);
    }

    .studio12-page .s12-btn-outline {
      color: var(--s12-espresso);
      background: transparent;
      border: 1px solid rgba(42, 31, 24, 0.2);
    }

    .studio12-page .s12-btn-outline:hover {
      border-color: var(--s12-clay);
      color: var(--s12-clay);
    }

    .studio12-page .s12-marquee {
      background: var(--s12-espresso);
      padding: 16px 0;
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .studio12-page .s12-marquee-inner {
      display: flex;
      gap: 48px;
      animation: s12-strip 22s linear infinite;
      width: max-content;
    }

    @keyframes s12-strip {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    .studio12-page .s12-marquee-item {
      font-family: "Cormorant Garamond", serif;
      font-size: 14px;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(250, 247, 242, 0.45);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 48px;
    }

    .studio12-page .s12-marquee-item::after {
      content: "✦";
      font-style: normal;
      font-size: 8px;
      color: var(--s12-clay);
    }

    .studio12-page .s12-philosophy {
      padding: 100px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .studio12-page .s12-phil-label {
      font-size: 9px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--s12-clay);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .studio12-page .s12-phil-label::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--s12-clay);
    }

    .studio12-page .s12-phil-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(32px, 3.5vw, 52px);
      font-weight: 300;
      line-height: 1.1;
      margin: 0 0 20px;
    }

    .studio12-page .s12-phil-title em {
      font-style: italic;
      color: var(--s12-clay);
    }

    .studio12-page .s12-phil-body {
      font-size: 14px;
      line-height: 1.95;
      color: var(--s12-taupe);
      margin-bottom: 12px;
    }

    .studio12-page .s12-services {
      padding: 100px 40px;
      background: var(--s12-warm-white);
      border-top: 1px solid var(--s12-line);
      border-bottom: 1px solid var(--s12-line);
    }

    .studio12-page .s12-section-label {
      font-size: 9px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--s12-clay);
      margin-bottom: 16px;
      text-align: center;
    }

    .studio12-page .s12-section-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 300;
      line-height: 1.05;
      text-align: center;
      margin: 0 0 56px;
    }

    .studio12-page .s12-section-title em {
      font-style: italic;
      color: var(--s12-clay);
    }

    .studio12-page .s12-svc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--s12-line);
      max-width: 920px;
      margin: 0 auto;
    }

    .studio12-page .s12-svc-cell {
      background: var(--s12-warm-white);
      padding: 36px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      transition: background 0.35s;
    }

    .studio12-page .s12-svc-cell:hover {
      background: var(--s12-ivory);
    }

    .studio12-page .s12-svc-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 20px;
      font-weight: 300;
      margin: 0 0 6px;
    }

    .studio12-page .s12-svc-meta {
      font-size: 12px;
      color: var(--s12-taupe);
      line-height: 1.6;
    }

    .studio12-page .s12-svc-dur {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--s12-taupe-light);
      margin-top: 8px;
    }

    .studio12-page .s12-svc-price {
      font-family: "Cormorant Garamond", serif;
      font-size: 26px;
      font-weight: 300;
      color: var(--s12-clay);
      text-align: right;
      flex-shrink: 0;
    }

    .studio12-page .s12-gallery-light {
      position: relative;
      isolation: isolate;
      background: var(--s12-ivory);
      padding: 80px 0 80px 40px;
      overflow: hidden;
      border-top: 1px solid var(--s12-line);
      border-bottom: 1px solid var(--s12-line);
    }

    .studio12-page .s12-gallery-light > * {
      position: relative;
      z-index: 1;
    }

    .studio12-page .s12-gallery-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-right: 40px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .studio12-page .s12-gallery-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(36px, 4vw, 48px);
      font-weight: 300;
      color: var(--s12-espresso);
      margin: 0;
      line-height: 1;
    }

    .studio12-page .s12-gallery-title em {
      font-style: italic;
      color: var(--s12-clay);
    }

    .studio12-page .s12-gallery-title .s12-gallery-title-link {
      color: inherit;
      text-decoration: none;
      font: inherit;
    }
    .studio12-page .s12-gallery-title .s12-gallery-title-link:hover {
      opacity: 0.85;
    }

    .studio12-page .s12-gallery-link {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--s12-taupe);
      text-decoration: none;
      border-bottom: 1px solid rgba(42, 31, 24, 0.18);
      padding-bottom: 4px;
    }

    /* Dedicated /gallery: centered title, flush sides so grid (max-width) aligns visually */
    .studio12-page .s12-gallery-light--fullpage {
      padding-left: 0;
      padding-right: 0;
    }

    .studio12-page .s12-gallery-light--fullpage .s12-gallery-head {
      justify-content: center;
      padding-left: 40px;
      padding-right: 40px;
      margin-bottom: 28px;
    }

    .studio12-page .s12-gallery-light--fullpage .s12-gallery-title {
      text-align: center;
      width: 100%;
    }

    /* Gallery strip: infinite marquee (same idea as .s12-marquee-inner); count-based tile sizing via data-gallery-count */
    .studio12-page .s12-gallery-marquee {
      overflow: hidden;
      margin-left: -40px;
      margin-right: -40px;
      width: calc(100% + 80px);
    }

    .studio12-page .s12-gallery-marquee-inner {
      display: flex;
      flex-direction: row;
      width: max-content;
      animation: s12-gallery-marquee 50s linear infinite;

  <div id="root">
    <div class="container">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <script>
    (function() {
      if (/(?:^|[?&])bk_embed=1(?:&|$)/.test(location.search || '')) {
        document.documentElement.classList.add('bk-marketing-embed');
      }
      if (typeof firebase === 'undefined' || typeof firebaseConfig === 'undefined') {
        document.getElementById('root').innerHTML = '<div class="container"><div class="card"><p class="error">Firebase failed to load.</p></div></div>';
        return;
      }
      try { firebase.initializeApp(firebaseConfig); } catch (e) {
        document.getElementById('root').innerHTML = '<div class="container"><div class="card"><p class="error">Firebase init failed.</p></div></div>';
        return;
      }
      firebase.auth().signInAnonymously().catch(function(err) {
        console.warn('Anonymous sign-in failed (Storage uploads may fail):', err);
      });
      const db = firebase.firestore();
      const functions = firebase.functions();
      const storage = firebase.storage();

      function ensureAnonymousAuth() {
        if (firebase.auth().currentUser) return Promise.resolve();
        return firebase.auth().signInAnonymously();
      }

      /** Supports both subdomain routes (`{tenant}.getbookking.com/home`) and legacy path routes (`/tenant/home`). */
      function parsePath() {
        var path = (location.pathname || '').replace(/^\/+|\/+$/g, '');
        var parts = path ? path.split('/') : [];
        var host = (location.hostname || '').toLowerCase();
        var hostTenant = '';
        if (host.endsWith('.getbookking.com') && host !== 'getbookking.com' && host !== 'www.getbookking.com') {
          hostTenant = host.split('.')[0] || '';
        }

        var tenantSlug = '';
        var page = 'home';
        if (hostTenant) {
          tenantSlug = hostTenant.toLowerCase();
          page = (parts[0] || 'home').toLowerCase();
        } else {
          tenantSlug = (parts[0] || '').toLowerCase();
          page = (parts[1] || 'home').toLowerCase();
        }
        if (!page) page = 'home';
        if (page === tenantSlug) page = 'home';

        var isBookPath = page === 'book';
        var isGalleryPath = page === 'gallery';
        var isShopPath = page === 'shop';
        var isAboutPath = page === 'about';
        var serviceSlugIndex = hostTenant ? 1 : 2;
        var serviceSlug = isBookPath && parts[serviceSlugIndex] ? String(parts[serviceSlugIndex]).toLowerCase() : '';
        var sectionTarget = isShopPath ? 'shop' : (isAboutPath ? 'about' : '');
        return {
          tenantSlug: tenantSlug,
          page: page,
          serviceSlug: serviceSlug,
          isBookPath: isBookPath,
          isGalleryPath: isGalleryPath,
          isShopPath: isShopPath,
          isAboutPath: isAboutPath,
          sectionTarget: sectionTarget,
          isSubdomainRoute: !!hostTenant
        };
      }
      function tenantBaseUrl(tenant) {
        var slug = (tenant && tenant.slug ? String(tenant.slug) : '').toLowerCase();
        if (!slug) return location.origin;
        var host = (location.hostname || '').toLowerCase();
        var protocol = location.protocol || 'https:';
        if (host === slug + '.getbookking.com') return location.origin;
        if (host === 'getbookking.com' || host === 'www.getbookking.com' || host.endsWith('.getbookking.com')) {
          return protocol + '//' + slug + '.getbookking.com';
        }
        return location.origin + '/' + slug;
      }

      function fontStackForDisplayKey(key) {
        var k = (key || 'kanit').toLowerCase();
        if (k === 'oswald') {
          return "'Oswald', system-ui, sans-serif";
        }
        if (k === 'playfair') {
          return "'Playfair Display', Georgia, serif";
        }
        if (k === 'plus-jakarta-sans') {
          return "'Plus Jakarta Sans', system-ui, sans-serif";
        }
        if (k === 'teko') {
          return "'Teko', system-ui, sans-serif";
        }
        if (k === 'libre-baskerville') {
          return "'Libre Baskerville', Georgia, serif";
        }
        if (k === 'cormorant-garamond') {
          return "'Cormorant Garamond', Georgia, serif";
        }
        if (k === 'poiret-one') {
          return "'Poiret One', system-ui, sans-serif";
        }
        if (k === 'foglihten-no06') {
          return "'Foglihten No06', Georgia, serif";
        }
        if (k === 'butler') {
          return "'Butler', 'Libre Baskerville', Georgia, serif";
        }

      /** Split on ` · ` into exactly `count` segments (extra dots merge into the last segment). */
      function studio12SplitMiddleDot(raw, count) {
        var s = String(raw || '').trim();
        if (!s) {
          var empty = [];
          for (var z = 0; z < count; z++) empty.push('');
          return empty;
        }
        var parts = s.split(STUDIO12_MIDDLE_DOT_SEP).map(function(p) { return p.trim(); });
        while (parts.length < count) parts.push('');
        if (parts.length > count) {
          var tail = parts.slice(count - 1).join(STUDIO12_MIDDLE_DOT_SEP);
          parts = parts.slice(0, count - 1).concat([tail]);
        }
        return parts;
      }

      /** Prefer break after “… that …”; else split on a space near the middle. */
      function studio12SplitHeroHeadline(raw) {
        var s = String(raw || '').trim();
        if (!s) return { line1: '', line2: '' };
        var m = s.match(/^(.+?)\s+that\s+(.+)$/i);
        if (m) {
          return { line1: (m[1].trim() + ' that'), line2: m[2].trim() };
        }
        var mid = Math.floor(s.length / 2);
        var left = s.lastIndexOf(' ', mid);
        var right = s.indexOf(' ', mid);
        var breakAt = -1;
        if (left < 0) breakAt = right;
        else if (right < 0) breakAt = left;
        else breakAt = (mid - left <= right - mid) ? left : right;
        if (breakAt <= 0 || breakAt >= s.length - 1) {
          return { line1: s, line2: '' };
        }
        return { line1: s.slice(0, breakAt).trim(), line2: s.slice(breakAt + 1).trim() };
      }

      function bindGalleryLightbox(root) {
        if (!root) return;
        var lb = root.querySelector('#gallery-lightbox');
        if (!lb) return;
        var img = lb.querySelector('.gallery-lightbox-img');
        var backdrop = lb.querySelector('.gallery-lightbox-backdrop');
        var closeBtn = lb.querySelector('.gallery-lightbox-close');
        var prevBtn = lb.querySelector('.gallery-lightbox-prev');
        var nextBtn = lb.querySelector('.gallery-lightbox-next');
        var counterEl = lb.querySelector('.gallery-lightbox-counter');
        if (!img) return;
        var isStudio12Page = !!root.querySelector('.studio12-page');
        var urls = [];
        var idx = 0;
        function collectUrls() {
          var triggers = root.querySelectorAll('.gallery-lightbox-trigger');
          var list = [];
          var seen = Object.create(null);
          for (var i = 0; i < triggers.length; i++) {
            var u = triggers[i].getAttribute('data-gallery-full');
            if (u && !seen[u]) {
              seen[u] = true;
              list.push(u);
            }
          }
          return list;
        }
        function updateChrome() {
          var n = urls.length;
          if (counterEl) {
            counterEl.textContent = n > 1 ? (idx + 1) + ' / ' + n : '';
            counterEl.style.display = n > 1 ? '' : 'none';
          }
          var solo = n <= 1;
          if (prevBtn) prevBtn.disabled = solo;
          if (nextBtn) nextBtn.disabled = solo;
        }
        function showIndex(i) {
          if (!urls.length) return;
          idx = (i % urls.length + urls.length) % urls.length;
          img.src = urls[idx];
          img.alt = '';
          updateChrome();
        }
        function goPrev() { showIndex(idx - 1); }
        function goNext() { showIndex(idx + 1); }
        var onKey = function(ev) {
          if (ev.key === 'Escape') close();
          else if (ev.key === 'ArrowLeft') goPrev();
          else if (ev.key === 'ArrowRight') goNext();
        };
        function openFromTrigger(t) {
          var src = t.getAttribute('data-gallery-full');
          if (!src) return;
          urls = collectUrls();
          var j = urls.indexOf(src);
          if (j < 0 || !urls.length) return;
          idx = j;
          img.src = urls[idx];
          img.alt = '';
          lb.classList.add('gallery-lightbox--open');
          document.body.style.overflow = 'hidden';
          document.addEventListener('keydown', onKey);
          updateChrome();
        }
        function close() {
          lb.classList.remove('gallery-lightbox--open');
          img.src = '';
          urls = [];
          document.body.style.overflow = '';
          document.removeEventListener('keydown', onKey);
          if (counterEl) counterEl.textContent = '';
        }
        root.addEventListener('click', function(e) {
          var t = e.target.closest('.gallery-lightbox-trigger');
          if (!t || !root.contains(t)) return;
          if (!t.getAttribute('data-gallery-full')) return;
          e.preventDefault();
          e.stopPropagation();
          openFromTrigger(t);
        });
        if (backdrop) backdrop.addEventListener('click', close);
        if (closeBtn) {
          closeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            close();
          });
        }
        if (prevBtn) {
          prevBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            goPrev();
          });
        }
        if (nextBtn) {
          nextBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            goNext();
          });
        }
        if (!isStudio12Page) {
          var touchStartX = null;
          img.addEventListener('touchstart', function(e) {
            if (e.changedTouches.length !== 1) return;
            touchStartX = e.changedTouches[0].clientX;
          }, { passive: true });
          img.addEventListener('touchend', function(e) {
            if (touchStartX == null || e.changedTouches.length !== 1) return;
            var dx = e.changedTouches[0].clientX - touchStartX;
            touchStartX = null;
            if (urls.length <= 1) return;
            if (dx > 56) goPrev();
            else if (dx < -56) goNext();
          }, { passive: true });
        }
      }
      function shopCartStorageKey(tenantId) {
        return 'bk_shop_cart_v1_' + tenantId;
      }
      function readShopCart(tenantId) {
        try {
          var raw = localStorage.getItem(shopCartStorageKey(tenantId));
          if (!raw) return { lines: [] };
          var o = JSON.parse(raw);
          if (!o || !Array.isArray(o.lines)) return { lines: [] };
          return { lines: o.lines };
        } catch (e) {
          return { lines: [] };
        }
      }
      function writeShopCart(tenantId, cart) {
        try {
          localStorage.setItem(shopCartStorageKey(tenantId), JSON.stringify({ lines: cart.lines || [] }));
        } catch (e) {}
      }
      function findProductById(tenant, id) {
        var prods = tenant._products || [];
        for (var i = 0; i < prods.length; i++) {
          if (prods[i].id === id) return prods[i];
        }
        return null;
      }
      function effectiveUnitPrice(prod) {
        var p = Number(prod.price) || 0;
        var s = prod.salePrice != null ? Number(prod.salePrice) : NaN;
        if (!isNaN(s) && s < p) return s;
        return p;
      }
      function formatMoney(n) {
        var x = Number(n);
        if (isNaN(x)) x = 0;
        return '$' + x.toFixed(2);
      }
      function addLineToShopCart(tenantId, prod, qty) {
        var q = parseInt(qty, 10);
        if (!q || q < 1) q = 1;
        var cart = readShopCart(tenantId);
        var found = false;
        for (var i = 0; i < cart.lines.length; i++) {
          if (cart.lines[i].productId === prod.id) {
            cart.lines[i].qty += q;
            cart.lines[i].name = prod.name || '';
            cart.lines[i].unitPrice = effectiveUnitPrice(prod);
            found = true;
            break;
          }
        }
        if (!found) {
          cart.lines.push({
            productId: prod.id,
            qty: q,
            name: prod.name || '',
            unitPrice: effectiveUnitPrice(prod)
          });
        }
        writeShopCart(tenantId, cart);
      }
      function updateShopCartLineQty(tenantId, id, delta) {
        var cart = readShopCart(tenantId);
        for (var i = 0; i < cart.lines.length; i++) {
          if (cart.lines[i].productId === id) {
            cart.lines[i].qty += delta;
            if (cart.lines[i].qty <= 0) cart.lines.splice(i, 1);
            break;
          }
        }
        writeShopCart(tenantId, cart);
      }
      function removeShopCartLine(tenantId, id) {
        var cart = readShopCart(tenantId);
        var next = [];
        for (var j = 0; j < cart.lines.length; j++) {
          if (cart.lines[j].productId !== id) next.push(cart.lines[j]);
        }
        cart.lines = next;
        writeShopCart(tenantId, cart);
      }
      function formatShopCartNotes(cart) {
        var lines = cart && cart.lines ? cart.lines : [];
        if (!lines.length) return '';
        var parts = ['Products requested (from shop):'];
        var total = 0;
        for (var k = 0; k < lines.length; k++) {
          var L = lines[k];
          var unit = Number(L.unitPrice) || 0;
          var sub = unit * (L.qty || 0);
          total += sub;
          parts.push('- ' + (L.name || 'Item') + ' × ' + (L.qty || 0) + ' @ ' + formatMoney(unit) + ' = ' + formatMoney(sub));
        }
        parts.push('Estimated total: ' + formatMoney(total));
        return parts.join('\n');
      }

              if (m.dataset) m.dataset.currentProductId = '';
            } else if (d && d.classList.contains('bk-shop-open')) {
              d.classList.remove('bk-shop-open');
            }
          });
        }

        updateFabCount();
        checkoutBtn.disabled = !readShopCart(tenant.id).lines.length;
      }
      function loadProducts(tid) {
        return db.collection('tenants').doc(tid).collection('products').get()
          .then(function(snap){
            return snap.docs.filter(function(d){ return d.data().isActive !== false; }).map(function(d){
              var x = d.data();
              return {
                id: d.id,
                name: x.name || '',
                description: (x.description != null ? String(x.description) : '') || '',
                category: x.category || '',
                price: x.price || 0,
                salePrice: x.salePrice || null,
                imageUrl: x.imageUrl || ''
              };
            });
          });
      }
      function loadServices(tid) {
        return db.collection('tenants').doc(tid).collection('services').get()
          .then(function(snap){
            var list = snap.docs.filter(function(d){ return d.data().isActive !== false; }).map(function(d){
              var x = d.data();
              var pr = x.price;
              var so = x.sortOrder;
              var priceNum = (typeof pr === 'number' && !isNaN(pr)) ? pr : null;
              if (priceNum == null && pr != null && String(pr).trim() !== '') {
                var parsed = parseFloat(String(pr));
                if (!isNaN(parsed) && parsed > 0) priceNum = parsed;
              }
              var dm = x.durationMinutes;
              var durNum = (typeof dm === 'number' && !isNaN(dm) && dm > 0) ? Math.round(dm) : null;
              if (durNum == null && dm != null && String(dm).trim() !== '') {
                var pdi = parseInt(String(dm), 10);
                if (!isNaN(pdi) && pdi > 0) durNum = pdi;
              }
              return {
                id: d.id,
                slug: x.slug,
                name: x.name,
                description: (x.description != null ? String(x.description) : '') || '',
                price: priceNum,
                durationMinutes: durNum,
                imageUrl: x.imageUrl || '',
                sortOrder: (typeof so === 'number' && !isNaN(so)) ? so : 1e9
              };
            });
            list.sort(function(a, b){
              if (a.sortOrder !== b.sortOrder) return a.sortOrder - b.sortOrder;
              return (a.name || '').localeCompare(b.name || '');
            });
            return list;
          });
      }

      function init() {
        var p = parsePath();
        if (!p.tenantSlug) {
          document.getElementById('root').innerHTML = '<div class="container"><div class="card"><h1>Get Bookking</h1><p>Enter your booking link to get started.</p></div></div>';
          return;
        }
        loadTenant(p.tenantSlug).then(function(tenant){
          if (!tenant) {
            document.getElementById('root').innerHTML = '<div class="container">'+err('Business not found')+'</div>';
            return;
          }
          if (tenant.isActive === false) {
            document.getElementById('root').innerHTML = '<div class="container">'+err('This business is not accepting bookings right now.')+'</div>';
            return;
          }
          applyBranding(tenant);
          return Promise.all([loadServices(tenant.id), loadProducts(tenant.id)]).then(function(results){
            var services = results[0];
            tenant._products = results[1];
            var isShop = p.isShopPath;
            if (isShop) {
              if (!tenant.shopEnabled) {
                var shopBase = tenantBaseUrl(tenant);
                document.getElementById('root').innerHTML = '<div class="container"><div class="card"><p>Shop is not enabled.</p><p><a href="' + esc(shopBase + '/home') + '">Back to home</a></p></div></div>';
                applyBranding(tenant);
                return;
              }
              if (isBladeTheme(tenant)) {
                document.getElementById('root').innerHTML = bladeShopPage(tenant);
                bindTattooSidebar();
                bindBladeChrome();
                bindShopPage(tenant);
              } else if (isLuxeTheme(tenant)) {
                document.getElementById('root').innerHTML = luxeShopPage(tenant);
                bindTattooSidebar();
                bindShopPage(tenant);
              } else if (isStudio12Theme(tenant)) {
                document.getElementById('root').innerHTML = studio12ShopPage(tenant);
                bindStudio12Page();
                bindTattooSidebar();
                bindShopPage(tenant);
              } else if (isStonecutTheme(tenant)) {
                document.getElementById('root').innerHTML = stonecutShopPage(tenant);
                bindTattooSidebar();
                bindShopPage(tenant);
                bindStonecutNavChrome();
              } else {
                document.getElementById('root').innerHTML = classicShopPage(tenant);
                bindTattooSidebar();
                bindShopPage(tenant);
              }
              applyBranding(tenant);
              if (isStudio12Theme(tenant)) applySidebarIconColor(tenant, false, false);
              else applySidebarIconColor(tenant, false, true);
              return;
            }
            if (p.isGalleryPath && !tenantShowGalleryPage(tenant)) {
              document.getElementById('root').innerHTML = publicSitePageUnavailableHtml(tenant);
              applyBranding(tenant);
              return;
            }
            if (p.isAboutPath && !tenantShowAboutPage(tenant)) {
              document.getElementById('root').innerHTML = publicSitePageUnavailableHtml(tenant);
              applyBranding(tenant);
              return;
            }
            if (p.isBookPath && !tenantShowBookPage(tenant)) {
              document.getElementById('root').innerHTML = publicSitePageUnavailableHtml(tenant);
              applyBranding(tenant);
              return;
            }
            if (services.length === 0) {
              document.getElementById('root').innerHTML = '<div class="container"><div class="card"><h1>'+esc(tenant.displayName||'Book')+'</h1><p>No services available yet.</p></div></div>';
              applyBranding(tenant);
              return;
            }
            var presel = p.serviceSlug ? services.filter(function(s){ return s.slug === p.serviceSlug; })[0] : null;
            var showForm = p.isBookPath && services.length > 0;
            var isGallery = p.isGalleryPath;
            var isLuxeHome = (isLuxeTheme(tenant) && !p.isBookPath && !isGallery && !p.isShopPath);
            var isBladeHome = (isBladeTheme(tenant) && !p.isBookPath && !isGallery && !p.isShopPath);
            var isStonecutHome = (isStonecutTheme(tenant) && !p.isBookPath && !isGallery && !p.isShopPath);
            var isStudio12Home = (isStudio12Theme(tenant) && !p.isBookPath && !isGallery && !p.isShopPath);
            var isHairHome = (!isLuxeHome && !isBladeHome && !isStonecutHome && tenant.industry === 'hair' && !isStudio12Theme(tenant) && !p.isBookPath && !isGallery);
            var isBarberHome = (!isLuxeHome && !isBladeHome && !isStonecutHome && tenant.industry === 'barber' && !p.isBookPath && !isGallery);
            var isTattooHome = (!isLuxeHome && !isBladeHome && !isStonecutHome && tenant.industry === 'tattoos' && !p.isBookPath && !isGallery);
            var isNailsHome = (!isLuxeHome && !isBladeHome && !isStonecutHome && tenant.industry === 'nails' && !p.isBookPath && !isGallery);
            var isCustomHome = (!isLuxeHome && !isBladeHome && !isStonecutHome && tenant.industry === 'custom' && !p.isBookPath && !isGallery);
            var isThemedHome = isStudio12Home || isTattooHome || isHairHome || isBarberHome || isNailsHome || isCustomHome || isLuxeHome || isBladeHome || isStonecutHome;
            if (isGallery) {
              document.getElementById('root').innerHTML = galleryPage(tenant);
              bindGalleryLightbox(document.getElementById('root'));
              if (isStudio12Theme(tenant)) {
                bindStudio12Page();
                bindTattooSidebar();
              } else {
                bindTattooSidebar();
              }
              applyTenantColorVars(tenant);
              applyBodyPageColors(tenant, 'gallery');
              applyTenantTypography(tenant);
              if (isBladeTheme(tenant)) bindBladeChrome();
              applySidebarIconColor(tenant, false, true);
              return;
            }
            var homeContent = isBladeHome
              ? bladeHomePage(tenant, services)
              : isStonecutHome
                ? stonecutHomePage(tenant, services)
              : isLuxeHome
                ? luxeHomePage(tenant, services)
                : isStudio12Home
                  ? studio12HomePage(tenant, services)
                : isTattooHome
                  ? tattooHeroPage(tenant, services)
                  : isHairHome
                    ? hairTattooStyleHomePage(tenant, services)
                    : isBarberHome
                      ? barberPortfolioHomePage(tenant, services)
                      : (isNailsHome || isCustomHome)
                        ? classicPortfolioHomePage(tenant, services)
                        : classicPortfolioHomePage(tenant, services);
            if (showForm) {
              document.getElementById('root').innerHTML = form(tenant, services, presel);
              if (usesThemedChrome(tenant) || isStudio12Theme(tenant)) bindTattooSidebar();
              if (isStudio12Theme(tenant)) bindStudio12Page();
              if (isBladeTheme(tenant)) bindBladeChrome();
              if (isStonecutTheme(tenant)) {
                bindStonecutNavChrome();
              }
              try {
                var shopNotes = sessionStorage.getItem('bk_shop_cart_notes');
                if (shopNotes) {
                  var notesTa = document.querySelector('textarea[data-key="notes"]') ||
                    document.querySelector('#book-form textarea');
                  if (notesTa) notesTa.value = shopNotes;
                  sessionStorage.removeItem('bk_shop_cart_notes');
                }
              } catch (e) {}
            } else if (isThemedHome) {
              document.getElementById('root').innerHTML = homeContent;
              bindGalleryLightbox(document.getElementById('root'));
              if (isStudio12Home) {
                bindStudio12Page();
                bindTattooSidebar();
              } else {
                bindTattooSidebar();
              }
              if (isBladeHome) bindBladeChrome();
              if (isStonecutHome) {
                bindStonecutNavChrome();
                if (tenantShowShopPage(tenant) && tenant._products && tenant._products.length) {
                  bindShopPage(tenant);
                }
              }
            } else {
              document.getElementById('root').innerHTML = '<div class="container">' + homeContent + '</div>';
            }
            applyBranding(tenant);
            applySidebarIconColor(tenant, p.isBookPath, false);
            if (!showForm && p.sectionTarget) {
              setTimeout(function() {
                var target = document.getElementById(p.sectionTarget);
                if (target && target.scrollIntoView) {
                  target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
              }, 0);
            }
            if (!showForm && isBladeHome && (location.hash || '').toLowerCase() === '#services') {
              setTimeout(function() {
                var sec = document.getElementById('services');
                if (sec && sec.scrollIntoView) {
                  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
              }, 0);
            }
            if (showForm) {
              function uploadId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                  var r = Math.random()*16|0, v = c === 'x' ? r : (r&0x3|0x8);
                  return v.toString(16);
                });
              }
              function uploadFileFields(fm, tenantId, formResponses) {
                function runUploads() {
                  var fileInputs = fm.querySelectorAll('input[data-type="file"]');
                  var fieldPromises = [];
                  for (var fi = 0; fi < fileInputs.length; fi++) {
                    var inp = fileInputs[fi];
                    var key = inp.getAttribute('data-key');
                    if (!key || !inp.files || inp.files.length === 0) continue;
                    var uid = uploadId();
                    var pathBase = 'tenantRefImages/' + tenantId + '/' + uid + '/';
                    var uploads = [];
                    for (var j = 0; j < inp.files.length; j++) {
                      var file = inp.files[j];
                      var safeName = (file.name || 'image').replace(/[^a-zA-Z0-9._-]/g, '_');
                      var ref = storage.ref(pathBase + safeName);
                      uploads.push(ref.put(file).then(function(snapshot) { return snapshot.ref.getDownloadURL(); }));
                    }
                    fieldPromises.push(Promise.all(uploads).then(function(urls) {
                      formResponses[key] = urls;
                      return urls;
                    }));
                  }
                  if (fieldPromises.length === 0) return Promise.resolve(formResponses);
                  return Promise.all(fieldPromises).then(function() { return formResponses; });
                }
                return ensureAnonymousAuth().then(runUploads);
              }
              function setupDropzones(fm) {
                function fileListText(files) {
                  if (!files || !files.length) return '';
                  var names = [];
                  for (var i = 0; i < files.length; i++) names.push(files[i].name || ('file' + (i + 1)));
                  return names.join(', ');
                }
                function isAllowedFile(file) {
                  var t = (file && file.type) || '';
                  if (t.indexOf('image/') === 0) return true;
                  if (t === 'application/pdf') return true;
                  var n = (file && file.name) || '';
                  return /\.pdf$/i.test(n);
                }
                var dropzones = fm.querySelectorAll('.upload-drop[data-reference-images-drop]');
                for (var i = 0; i < dropzones.length; i++) {
                  (function(dz){
                    var input = dz.querySelector('input[type="file"]');
                    var listEl = dz.querySelector('[data-upload-filelist]');
                    if (!input) return;
                    function refreshList() {
                      if (listEl) listEl.textContent = fileListText(input.files) ? ('Selected: ' + fileListText(input.files)) : '';
                    }
                    input.addEventListener('change', refreshList);
                    dz.addEventListener('click', function(e){
                      if (e.target === input) return;
                      input.click();
                    });
                    dz.addEventListener('keydown', function(e){
                      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
                    });
                    ['dragenter','dragover'].forEach(function(ev){
                      dz.addEventListener(ev, function(e){
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.add('dragover');
                      });
                    });
                    ['dragleave','drop'].forEach(function(ev){
                      dz.addEventListener(ev, function(e){
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.remove('dragover');
                      });
                    });
                    dz.addEventListener('drop', function(e){
                      var files = e.dataTransfer && e.dataTransfer.files;
                      if (!files || !files.length) return;
                      var dt = new DataTransfer();
                      for (var j = 0; j < files.length; j++) {
                        if (isAllowedFile(files[j])) dt.items.add(files[j]);
                      }
                      if (dt.files.length) {
                        input.files = dt.files;
                        refreshList();
                      }
                    });
                  })(dropzones[i]);
                }
              }
              function setupPreferredDaysDropdown(fm) {
                var groups = fm.querySelectorAll('[data-pref-days-dropdown]');
                for (var gi = 0; gi < groups.length; gi++) {
                  (function(group){
                    var button = group.querySelector('[data-pref-days-button]');
                    var menu = group.querySelector('[data-pref-days-menu]');
                    var summary = group.querySelector('[data-pref-days-summary]');
                    var hidden = group.querySelector('[data-preferred-days-hidden]');
                    var options = group.querySelectorAll('[data-pref-day]');

                    if (!button || !menu || !summary || !hidden || !options || !options.length) return;

                    function selectedFromHidden() {
                      var val = hidden.value || '';
                      return val ? val.split(',').map(function(x){ return x.trim(); }).filter(Boolean) : [];
                    }

                    function updateUI(selected) {
                      for (var oi = 0; oi < options.length; oi++) {
                        var opt = options[oi];
                        var day = opt.getAttribute('data-pref-day');
                        var isActive = selected.indexOf(day) >= 0;
                        opt.classList.toggle('active', isActive);
                        opt.setAttribute('aria-selected', isActive ? 'true' : 'false');
                      }

                      if (!selected.length) {
                        summary.textContent = 'Preferred days';
                      } else {
                        // Always show the chosen days (even for 3+ selections).
                        summary.textContent = selected.join(', ');
                      }
                    }

                    function toggleMenu(open) {
                      var shouldOpen = (typeof open === 'boolean') ? open : !menu.classList.contains('open');
                      if (shouldOpen) menu.classList.add('open');
                      else menu.classList.remove('open');
                      button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
                    }

                    function toggleDay(day) {
                      var selected = selectedFromHidden();
                      var idx = selected.indexOf(day);
                      if (idx >= 0) selected.splice(idx, 1);
                      else selected.push(day);
                      hidden.value = selected.join(',');
                      updateUI(selected);
                    }

                    // Initialize UI from current hidden value
                    updateUI(selectedFromHidden());

                    button.addEventListener('click', function(e){
                      e.preventDefault();
                      e.stopPropagation();
                      toggleMenu();
                    });

                    for (var oi = 0; oi < options.length; oi++) {
                      (function(opt){
                        var day = opt.getAttribute('data-pref-day');
                        opt.addEventListener('click', function(e){
                          e.preventDefault();
                          e.stopPropagation();
                          toggleDay(day);
                        });
                      })(options[oi]);
                    }

                    document.addEventListener('click', function(ev){
                      if (!group.contains(ev.target)) {
                        menu.classList.remove('open');
                        button.setAttribute('aria-expanded', 'false');
                      }
                    });
                  })(groups[gi]);
                }
              }
              var fm = document.getElementById('book-form');
              if (fm) {
              setupDropzones(fm);
              setupPreferredDaysDropdown(fm);
              setupGuidedBookingForm(fm);
              injectBookingSmsConsent(fm, tenant);
              attachTitleCaseNameInputs(fm);
              fm.addEventListener('submit', function(ev){
                ev.preventDefault();
                if (fm.dataset.guidedStep) {
                  var confirmAt = fm.getAttribute('data-guided-confirm-step') || '3';
                  if (fm.dataset.guidedStep !== confirmAt) return;
                }
                var errEl = document.getElementById('form-error');
                errEl.style.display = 'none';
                var btn = fm.querySelector('button[type="submit"]');
                btn.disabled = true;
                var origText = btn.textContent;
                btn.textContent = 'Uploading…';
                var formResponses = {};
                [].forEach.call(fm.querySelectorAll('[data-key]'), function(el){
                  if (el.getAttribute('data-type') === 'file') return;
                  var k = el.getAttribute('data-key');
                  var v = (el.value||'').trim();
                  if (k) formResponses[k] = v || null;
                });
                if (formResponses.name) {
                  formResponses.name = titleCaseWords(formResponses.name);
                  var nameInput = fm.querySelector('input[data-key="name"]');
                  if (nameInput) nameInput.value = formResponses.name;
                }
                uploadFileFields(fm, tenant.id, formResponses).then(function() {
                  btn.textContent = 'Submitting…';
                  var customerName = formResponses.name || '';
                  function normalizeEmail(v) {
                    return (v || '').toString().trim().toLowerCase().replace(/\s+/g, '');
                  }
                  function normalizePhone(raw) {
                    var s = (raw || '').toString().trim();
                    if (!s) return null;

                    var hasPlus = s.charAt(0) === '+';
                    var digits = s.replace(/\D/g, '');
                    if (!digits) return null;

                    function formatUS10(d10) {
                      return '(' + d10.slice(0,3) + ') ' + d10.slice(3,6) + '-' + d10.slice(6,10);
                    }

                    // US +1 or 10-digit formats
                    if (digits.length === 10) return formatUS10(digits);
                    if (digits.length === 11 && digits.charAt(0) === '1') return formatUS10(digits.slice(1));

                    // If user entered +<country>, preserve best-effort with +
                    if (hasPlus) return '+' + digits;

                    // Best-effort for all other countries: prefix + for anything >= 7 digits
                    if (digits.length >= 7) return '+' + digits;

                    // Too short: keep raw digits
                    return digits;
                  }
                  var customerEmail = normalizeEmail(formResponses.email);
                  var customerPhone = normalizePhone(formResponses.phone);
                  var preferredDays = null;
                  if (formResponses.preferredDays) {
                    preferredDays = (formResponses.preferredDays || '')
                      .toString()
                      .split(',')
                      .map(function(x){ return (x||'').trim(); })
                      .filter(Boolean);
                    if (!preferredDays.length) preferredDays = null;
                  }
                  var preferredTime =
                    (formResponses.preferredTime || formResponses.preferredTimeOfDay || '').toString().trim();
                  if (!preferredTime) preferredTime = null;
                  var serviceId = null, serviceSlugVal = null, serviceName = null;
                  var sel = fm.querySelector('[data-key="service"]');
                  if (sel && sel.options && sel.options[sel.selectedIndex]) {
                    var opt = sel.options[sel.selectedIndex];
                    serviceId = opt.value;
                    serviceSlugVal = opt.dataset.slug || null;
                    serviceName = opt.dataset.name || null;
                  }
                  if (!serviceId) {
                    errEl.textContent = 'Please select a service.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = origText;
                    return;
                  }
                  var smsConsentAccepted = false;
                  var smsConsentEl = fm.querySelector('[data-sms-consent-checkbox]');
                  if (smsConsentEl) smsConsentAccepted = smsConsentEl.checked === true;
                  if (customerPhone && smsConsentEl && !smsConsentAccepted) {
                    errEl.textContent = 'Please agree to receive appointment-related text messages to continue.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = origText;
                    return;
                  }
                  if (smsConsentAccepted && !customerPhone) {
                    errEl.textContent = 'Please enter your mobile number to receive text messages.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = origText;
                    return;
                  }
                  return functions.httpsCallable('createBookingRequestFromWeb')({
                    tenantSlug: tenant.slug,
                    customerName: customerName,
                    customerEmail: customerEmail,
                    customerPhone: customerPhone,
                    smsConsentAccepted: smsConsentAccepted,
                    serviceId: serviceId,
                    serviceSlug: serviceSlugVal,
                    serviceName: serviceName,
                    preferredTime: preferredTime,
                    preferredDays: preferredDays,
                    notes: formResponses.notes || null,
                    formResponses: formResponses
                  });
                }).then(function(){
                  var doneHtml = bookingSuccessHtml(tenant);
                  document.getElementById('root').innerHTML = (usesThemedChrome(tenant) || isStudio12Theme(tenant)) ? doneHtml : '<div class="container">' + doneHtml + '</div>';
                  applyBranding(tenant);
                  if (usesThemedChrome(tenant) || isStudio12Theme(tenant)) bindTattooSidebar();
                  if (isStudio12Theme(tenant)) bindStudio12Page();
                  if (isBladeTheme(tenant)) bindBladeChrome();
                  if (isStonecutTheme(tenant)) {
                    bindStonecutNavChrome();
                  }
                  applySidebarIconColor(tenant, true, false);
                }).catch(function(e){
                  errEl.textContent = (e && e.message) ? e.message : 'Something went wrong. Please try again.';
                  errEl.style.display = 'block';
                  btn.disabled = false;
                  btn.textContent = origText;
                });
              });
              }
            }
          });
        }).catch(function(e){
          console.error(e);
          document.getElementById('root').innerHTML = '<div class="container">'+err(e && e.message ? e.message : 'Failed to load.')+'</div>';
        });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  </script>
