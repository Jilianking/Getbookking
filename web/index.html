<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book an appointment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      color: #333;
      background: #f5f5f5;
      background-size: auto;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 24px; min-height: 100vh; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .logo { max-height: 120px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .tagline { font-size: 14px; color: #666; margin-bottom: 36px; }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .card-header .logo {
      width: 112px;
      height: 112px;
      max-height: none;
      object-fit: cover;
      flex-shrink: 0;
      margin: 0;
      border-radius: 8px;
    }
    .card-header-text { flex: 1; min-width: 0; }
    .card-header-text h1 { font-size: 24px; margin: 0 0 6px; }
    .card-header-text .tagline { font-size: 14px; color: #666; margin: 0; }
    .service-list { list-style: none; padding: 0; margin: 0; margin-top: 8px; }
    .service-item {
      display: block;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: #f0f0f0;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      font-weight: 500;
      transition: background 0.2s;
    }
    .service-item:hover { background: #e5e5e5; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type="file"] { padding: 8px; font-size: 14px; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link {
      display: inline-block;
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    .error { color: #c00; font-size: 14px; margin-bottom: 16px; }
    .success { color: #22c55e; font-size: 16px; font-weight: 500; text-align: center; padding: 24px; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .hero-page { min-height: 100vh; display: flex; flex-direction: column; }
    .hero-section {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-size: cover; background-position: center; background-color: #111;
    }
    .hero-overlay {
      text-align: center; padding: 24px; max-width: 480px;
    }
    .hero-title { font-size: 2.5rem; font-weight: 600; color: #fff; margin: 0 0 32px; letter-spacing: 0.02em; }
    .btn-book-now {
      display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 600;
      background: #fff; color: #111; border: none; border-radius: 8px; text-decoration: none;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-book-now:hover { opacity: 0.9; }
    .featured-work { padding: 48px 24px; background: #f5f5f5; }
    .featured-work h2 { font-size: 1.5rem; margin: 0 0 24px; text-align: center; }
    .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; max-width: 800px; margin: 0 auto; }
    .featured-grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; display: block; }
    /* Booking form shell – light page, white card */
    .booking-shell {
      min-height: 100vh;
      background: #000;
      padding: 84px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .booking-card {
      width: 100%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    }
    @media (min-width: 768px) {
      .booking-card {
        padding: 32px 40px;
        border-radius: 24px;
      }
    }
    .booking-heading {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 12px;
    }
    /* Gallery-style header for booking (matches tattoo gallery title) */
    .booking-page-header {
      width: 100%;
      text-align: center;
      margin: 0 0 28px;
    }
    .booking-page-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      margin: 0;
    }
    .booking-page-subtitle {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.65);
    }
    .booking-tagline {
      font-size: 0.95rem;
      color: #4b5563;
      margin: 0 0 20px;
    }
    .booking-form label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #111827;
    }
    .booking-form input,
    .booking-form textarea,
    .booking-form select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      font-size: 0.95rem;
      margin-bottom: 14px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .booking-form input:focus,
    .booking-form textarea:focus,
    .booking-form select:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(248,113,113,0.2);
    }
    /* Client-facing upload dropzone (reference images / PDFs) */
    .upload-drop {
      width: 100%;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 2px dashed rgba(239, 68, 68, 0.35);
      background: rgba(17, 24, 39, 0.03);
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.12s ease;
    }
    .upload-drop:hover {
      border-color: rgba(239, 68, 68, 0.65);
      transform: translateY(-1px);
    }
    .upload-drop.dragover {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.2);
      background: rgba(239, 68, 68, 0.06);
    }
    .upload-drop-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    .upload-drop-inner { display: flex; flex-direction: column; gap: 6px; }
    .upload-drop-title {
      font-weight: 800;
      color: #111827;
      font-size: 0.95rem;
      margin: 0;
    }
    .upload-drop-sub {
      color: rgba(17, 24, 39, 0.65);
      font-size: 0.85rem;
      margin: 0;
    }
    .upload-drop-filelist {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #6b7280;
      word-break: break-all;
    }
    /* Preferred days dropdown (multi-select) */
    .pref-days-dropdown {
      width: 100%;
      margin-bottom: 14px;
      position: relative;
    }
    .pref-days-button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      color: #111827;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      user-select: none;
    }
    .pref-days-button:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.2);
    }
    .pref-days-summary {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pref-days-caret { color: #6b7280; }
    .pref-days-menu {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      z-index: 30;
      max-height: 240px;
      overflow: auto;
    }
    .pref-days-menu.open { display: block; }
    .pref-days-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 800;
      color: #111827;
      text-align: left;
    }
    .pref-days-option:hover { background: rgba(239, 68, 68, 0.08); }
    .pref-days-option.active { background: rgba(239, 68, 68, 0.12); }
    .pref-days-check {
      width: 18px;
      color: transparent;
      font-weight: 900;
    }
    .pref-days-option.active .pref-days-check { color: #ef4444; }
    .booking-submit {
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: none;
      font-weight: 800;
      font-size: 1.05rem;
      background: #111827;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(0,0,0,0.5);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .booking-submit:hover {
      background: #000;
      transform: translateY(-1px);
      box-shadow: 0 22px 50px rgba(0,0,0,0.65);
    }
    .booking-submit:disabled {
      opacity: 0.7;
      cursor: default;
      transform: none;
      box-shadow: none;
    }
    /* Force black submit button on white booking background */
    .booking-shell .booking-submit {
      background: #000 !important;
      color: #fff !important;
    }
    .about-artist { padding: 48px 24px; max-width: 560px; margin: 0 auto; }
    .about-artist h2 { font-size: 1.5rem; margin: 0 0 16px; }
    .about-artist p { margin: 0; line-height: 1.6; color: #444; }
    /* Tattoo (Bleu-style) layout */
    .tattoo-page { min-height: 100vh; background: #fff; color: #111; }
    .tattoo-hero-wrap { position: relative; width: 100%; }
    .tattoo-nav {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      background: none;
      backdrop-filter: none;
    }
    .tattoo-nav-inner {
      margin: 0;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
    }
    .tattoo-nav .tattoo-logo { max-height: 36px; width: auto; border-radius: 6px; }
    .tattoo-nav .tattoo-brand { font-weight: 700; font-size: 1.1rem; color: #fff; text-decoration: none; }
    .tattoo-nav-links { display: flex; align-items: center; gap: 24px; font-size: 14px; }
    .tattoo-nav-links a { color: rgba(255,255,255,0.95); text-decoration: none; }
    .tattoo-nav-links a:hover { color: #fff; text-decoration: underline; }
    .tattoo-nav-menu { background: none; border: none; color: #fff; font-size: 2rem; padding: 12px; cursor: pointer; line-height: 1; }
    .tattoo-hero-section {
      min-height: 60vh; display: flex; align-items: center; justify-content: center;
      background-size: cover; background-position: center; background-color: #111;
      padding: 24px;
    }
    .tattoo-shell { max-width: 1400px; margin: 0 auto; padding: 0 32px 64px; }
    /* Sidebar: works on all screen sizes */
    .tattoo-sidebar { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
    .tattoo-sidebar.tattoo-sidebar-open { pointer-events: auto; }
    .tattoo-sidebar-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.25s; }
    .tattoo-sidebar-open .tattoo-sidebar-backdrop { opacity: 1; }
    .tattoo-sidebar-panel { position: absolute; top: 0; left: 0; bottom: 0; width: 320px; max-width: 85vw; background: #fff; box-shadow: 2px 0 16px rgba(0,0,0,0.18); transform: translateX(-100%); transition: transform 0.25s; padding: 32px 24px; }
    .tattoo-sidebar-open .tattoo-sidebar-panel { transform: translateX(0); }
    .tattoo-sidebar-panel a { display: block; padding: 16px 0; font-size: 20px; color: #111; text-decoration: none; border-bottom: 1px solid #eee; }
    .tattoo-sidebar-panel a:last-child { border-bottom: none; }
    @media (max-width: 768px) {
      .tattoo-nav-links { display: none; }
    }
    .tattoo-hero-overlay { text-align: center; padding: 24px; max-width: 480px; }
    .tattoo-hero-title { font-size: 2.25rem; font-weight: 600; color: #fff; margin: 0 0 24px; letter-spacing: 0.02em; }
    .tattoo-btn-book { display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 600; background: #fff; color: #111; border-radius: 8px; text-decoration: none; }
    .tattoo-btn-book:hover { opacity: 0.92; }
    .tattoo-featured { padding: 32px 0 56px; }
    .tattoo-featured h2 { font-size: 1.5rem; margin: 0 0 8px; font-weight: 600; }
    .tattoo-featured-sub { font-size: 14px; color: #666; margin: 0 0 24px; }
    .tattoo-featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .tattoo-featured-grid img { width: 100%; height: 400px; object-fit: cover; border-radius: 12px; display: block; }
    .tattoo-featured-placeholder {
      grid-column: 1 / -1; padding: 48px 24px; text-align: center; color: #888;
      font-size: 14px; background: #f9f9f9; border-radius: 12px; border: 1px dashed #ddd;
    }
    .tattoo-gallery-link { display: inline-block; margin-top: 20px; font-size: 14px; color: #333; font-weight: 500; text-decoration: none; }
    .tattoo-gallery-link:hover { text-decoration: underline; }
    @media (max-width: 640px) { .tattoo-featured-grid { grid-template-columns: repeat(2, 1fr); } .tattoo-featured-grid img { height: 180px; } .tattoo-hero-section { min-height: 55vh; } .booking-page-title { font-size: 2rem; } .booking-shell { padding-top: 72px; } }
    .tattoo-about { padding: 64px 24px; background: #111; color: #fff; text-align: center; }
    .tattoo-about-inner { max-width: 640px; margin: 0 auto; }
    .tattoo-about h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 2.2rem; font-weight: 700; margin: 0 0 24px; color: #fff; letter-spacing: 0.02em; }
    .tattoo-about-bio { margin: 0 0 48px; line-height: 1.75; color: rgba(255,255,255,0.75); font-size: 1rem; }
    .tattoo-contact-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; padding: 0; border: none; }
    .tattoo-contact-item { text-align: center; }
    .tattoo-contact-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .tattoo-contact-icon svg { width: 28px; height: 28px; fill: none; stroke: #fff; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .tattoo-contact-item h3 { font-size: 15px; font-weight: 600; color: #fff; text-transform: none; letter-spacing: 0; margin: 0 0 8px; }
    .tattoo-contact-item p { margin: 0; font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.6; }
    .tattoo-contact-item a { color: rgba(255,255,255,0.6); text-decoration: none; }
    .tattoo-contact-item a:hover { color: #fff; text-decoration: underline; }
    .tattoo-contact-placeholder { color: rgba(255,255,255,0.3); font-style: italic; }
    @media (max-width: 640px) { .tattoo-contact-strip { grid-template-columns: 1fr; gap: 24px; } .tattoo-about h2 { font-size: 1.8rem; } }
    /* Gallery page */
    .gallery-page { min-height: 100vh; background: #000; color: #fff; }
    .gallery-header { text-align: center; padding: 80px 24px 24px; }
    .gallery-title { font-family: 'Playfair Display', Georgia, serif; font-size: 3rem; font-weight: 700; letter-spacing: 0.02em; margin: 0; color: #fff; }
    .gallery-shell { max-width: 1400px; margin: 0 auto; padding: 0 24px 64px; }
    .gallery-section { margin-bottom: 48px; }
    .gallery-section-title { font-size: 1.2rem; font-weight: 600; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 20px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.12); }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .gallery-grid img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; display: block; cursor: pointer; transition: opacity 0.2s; }
    .gallery-grid img:hover { opacity: 0.85; }
    @media (max-width: 640px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .gallery-grid img { height: 180px; }
      .gallery-title { font-size: 2rem; }
      .gallery-header { padding: 64px 16px 16px; }
    }
    /* Trades (plumbing / electrical) Framer-style layout */
    .trades-page {
      min-height: 100vh;
      padding: 0 20px 64px;
      background: radial-gradient(circle at top left, #1d4ed8 0%, #020617 55%, #000000 100%);
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }
    .trades-shell {
      max-width: 1040px;
      margin: 0 auto;
    }
    .trades-nav-framer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 8px;
      gap: 16px;
    }
    .trades-nav-framer .logo {
      max-height: 32px;
      width: auto;
      border-radius: 6px;
    }
    .trades-nav-framer .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 14px;
    }
    .trades-nav-framer .nav-links a {
      color: #cbd5f5;
      text-decoration: none;
    }
    .trades-nav-framer .nav-links a:hover {
      color: #ffffff;
    }
    .trades-nav-framer .btn-contact {
      padding: 8px 18px;
      border-radius: 999px;
      background: #fbbf24;
      color: #111827;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .trades-hero {
      padding: 56px 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      max-width: 960px;
    }
    .trades-hero-left {
      flex: 1.2;
      min-width: 0;
    }
    .trades-hero-right {
      flex: 1;
      display: flex;
      justify-content: flex-end;
    }
    .trades-hero h1 {
      font-size: clamp(36px, 4vw, 46px);
      font-weight: 700;
      color: #f9fafb;
      margin: 0 0 16px;
      letter-spacing: -0.03em;
    }
    .trades-hero .trades-tagline {
      font-size: 16px;
      line-height: 1.6;
      color: #cbd5f5;
      margin: 0 0 18px;
      max-width: 540px;
    }
    .btn-trades-cta {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: #fbbf24;
      color: #111827;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      box-shadow: 0 10px 32px rgba(0,0,0,0.45);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    .btn-trades-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.55);
      background: #facc15;
    }
    .trades-hero .trades-social-proof {
      margin-top: 16px;
      font-size: 13px;
      color: #9ca3af;
    }
    .trades-hero-logo {
      max-width: 220px;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
      object-fit: cover;
    }
    @media (max-width: 768px) {
      .trades-hero {
        flex-direction: column;
        align-items: flex-start;
      }
      .trades-hero-right {
        width: 100%;
        justify-content: center;
        margin-top: 20px;
      }
    }
    .trades-strip {
      padding-bottom: 56px;
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    @media (max-width: 768px) {
      .trades-strip {
        grid-template-columns: minmax(0, 1fr);
      }
    }
    .trades-strip-item {
      background: rgba(15, 23, 42, 0.92);
      border-radius: 18px;
      padding: 18px 20px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.7);
    }
    .trades-strip-item.primary {
      background: #0f172a;
    }
    .trades-strip-item h3 {
      font-size: 16px;
      font-weight: 600;
      color: #f9fafb;

      function parsePath() {
        var path = (location.pathname || '').replace(/^\/+|\/+$/g, '');
        var parts = path ? path.split('/') : [];
        var tenantSlug = parts[0] || '';
        var isBookPath = parts[1] === 'book';
        var isGalleryPath = parts[1] === 'gallery';
        var serviceSlug = isBookPath && parts[2] ? parts[2] : '';
        return { tenantSlug: tenantSlug, serviceSlug: serviceSlug, isBookPath: isBookPath, isGalleryPath: isGalleryPath };
      }

      function applyBranding(t) {
        var bg = t.backgroundColor || '#FFFFFF';
        var card = t.cardSurfaceColor || '#F5F5F5';
        var txt = t.textColor || '#333333';
        var accent = t.primaryColor || '#000000';
        document.body.style.background = bg;
        document.body.style.color = txt;
        document.body.style.backgroundImage = '';
        [].forEach.call(document.querySelectorAll('.card'), function(el){ el.style.background = card; });
        [].forEach.call(document.querySelectorAll('button[data-accent]'), function(el){ el.style.background = accent; el.style.color = '#fff'; });
        // Override for Hair template: light theme
        if (t.industry === 'hair') {
          document.body.style.background = '#ffffff';
          document.body.style.color = '#111827';
        }
        // Override for Tattoo template: white page, dark text (Bleu-style)
        if (t.industry === 'tattoos') {
          document.body.style.background = '#ffffff';
          document.body.style.color = '#111';
        }
        // Override for trades (plumbing / electrical): deep blue hero background
        if (t.industry === 'plumbing' || t.industry === 'electrical') {
          document.body.style.background = 'radial-gradient(circle at top left, #1d4ed8 0%, #020617 55%, #000000 100%)';
          document.body.style.color = '#e5e7eb';
        }
      }

      function applySidebarIconColor(tenant, isBookPath, isGalleryPath) {
        var iconColor = '';

        if (isBookPath && tenant.sidebarIconColorBooking) {
          iconColor = tenant.sidebarIconColorBooking;
        } else if (!isBookPath && !isGalleryPath && tenant.sidebarIconColorHome) {
          iconColor = tenant.sidebarIconColorHome;
        }

        if (!iconColor) {
          if (isGalleryPath) {
            iconColor = '#FFFFFF';
          } else if (isBookPath) {
            iconColor = (tenant.industry === 'tattoos') ? '#FFFFFF' : '#000000';
          } else if (tenant.industry === 'tattoos' || tenant.industry === 'hair' ||
                     tenant.industry === 'plumbing' || tenant.industry === 'electrical') {
            iconColor = '#FFFFFF';
          } else {
            var bg = (tenant.backgroundColor || '#FFFFFF').toUpperCase().replace(/\s/g, '');
            iconColor = (bg === '#FFFFFF' || bg === '#FFF') ? '#000000' : '#FFFFFF';
          }
        }

        var btns = document.querySelectorAll('.tattoo-nav-menu');
        for (var i = 0; i < btns.length; i++) {
          btns[i].style.color = iconColor;
        }
      }

        var base = location.origin + '/' + tenant.slug;
        var items = services.map(function(s){ return '<a href="'+base+'/book/'+s.slug+'" class="service-item">'+esc(s.name)+'</a>'; }).join('');
        var title = '<h1>'+esc(tenant.displayName||'Book an appointment')+'</h1>';
        var taglineHtml = tenant.tagline ? '<p class="tagline">'+esc(tenant.tagline)+'</p>' : '';
        var header;
        if (tenant.logoUrl) {
          header = '<div class="card-header">' +
            '<img class="logo" src="'+tenant.logoUrl+'" alt="">' +
            '<div class="card-header-text">' + title + taglineHtml + '</div></div>';
        } else {
          header = title + taglineHtml;
        }
        return '<div class="card">' + header + '<ul class="service-list">'+items+'</ul></div>';
      }

              document.getElementById('root').innerHTML = galleryPage(tenant);
              bindTattooSidebar();
              document.body.style.background = '#000';
              document.body.style.color = '#fff';
              applySidebarIconColor(tenant, false, true);
              return;
            }
            var homeContent = isTattooHome
              ? tattooHeroPage(tenant)
              : isTradesHome
                ? tradesLayoutPage(tenant, services)
                : isHairHome
                  ? hairLayoutPage(tenant, services)
                  : list(tenant, services);
            if (showForm) {
              document.getElementById('root').innerHTML = form(tenant, services, presel);
              if (tenant.industry === 'tattoos') bindTattooSidebar();
            } else if (isTradesHome || isTattooHome) {
              document.getElementById('root').innerHTML = homeContent;
              if (isTattooHome) bindTattooSidebar();
            } else {
              document.getElementById('root').innerHTML = '<div class="container">' + homeContent + '</div>';
            }
            applyBranding(tenant);
            applySidebarIconColor(tenant, p.isBookPath, false);
            if (showForm) {
              function uploadId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                  var r = Math.random()*16|0, v = c === 'x' ? r : (r&0x3|0x8);
                  return v.toString(16);
                });
              }
              function uploadFileFields(fm, tenantId, formResponses) {
                var fileInputs = fm.querySelectorAll('input[data-type="file"]');
                var fieldPromises = [];
                for (var fi = 0; fi < fileInputs.length; fi++) {
                  var inp = fileInputs[fi];
                  var key = inp.getAttribute('data-key');
                  if (!key || !inp.files || inp.files.length === 0) continue;
                  var uid = uploadId();
                  var pathBase = 'tenantRefImages/' + tenantId + '/' + uid + '/';
                  var uploads = [];
                  for (var j = 0; j < inp.files.length; j++) {
                    var file = inp.files[j];
                    var safeName = (file.name || 'image').replace(/[^a-zA-Z0-9._-]/g, '_');
                    var ref = storage.ref(pathBase + safeName);
                    uploads.push(ref.put(file).then(function(snapshot) { return snapshot.ref.getDownloadURL(); }));
                  }
                  fieldPromises.push(Promise.all(uploads).then(function(urls) {
                    formResponses[key] = urls;
                    return urls;
                  }));
                }
                if (fieldPromises.length === 0) return Promise.resolve(formResponses);
                return Promise.all(fieldPromises).then(function() { return formResponses; });
              }
              function setupDropzones(fm) {
                function fileListText(files) {
                  if (!files || !files.length) return '';
                  var names = [];
                  for (var i = 0; i < files.length; i++) names.push(files[i].name || ('file' + (i + 1)));
                  return names.join(', ');
                }
                function isAllowedFile(file) {
                  var t = (file && file.type) || '';
                  if (t.indexOf('image/') === 0) return true;
                  if (t === 'application/pdf') return true;
                  var n = (file && file.name) || '';
                  return /\.pdf$/i.test(n);
                }
                var dropzones = fm.querySelectorAll('.upload-drop[data-reference-images-drop]');
                for (var i = 0; i < dropzones.length; i++) {
                  (function(dz){
                    var input = dz.querySelector('input[type="file"]');
                    var listEl = dz.querySelector('[data-upload-filelist]');
                    if (!input) return;
                    function refreshList() {
                      if (listEl) listEl.textContent = fileListText(input.files) ? ('Selected: ' + fileListText(input.files)) : '';
                    }
                    input.addEventListener('change', refreshList);
                    dz.addEventListener('click', function(e){
                      if (e.target === input) return;
                      input.click();
                    });
                    dz.addEventListener('keydown', function(e){
                      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); }
                    });
                    ['dragenter','dragover'].forEach(function(ev){
                      dz.addEventListener(ev, function(e){
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.add('dragover');
                      });
                    });
                    ['dragleave','drop'].forEach(function(ev){
                      dz.addEventListener(ev, function(e){
                        e.preventDefault();
                        e.stopPropagation();
                        dz.classList.remove('dragover');
                      });
                    });
                    dz.addEventListener('drop', function(e){
                      var files = e.dataTransfer && e.dataTransfer.files;
                      if (!files || !files.length) return;
                      var dt = new DataTransfer();
                      for (var j = 0; j < files.length; j++) {
                        if (isAllowedFile(files[j])) dt.items.add(files[j]);
                      }
                      if (dt.files.length) {
                        input.files = dt.files;
                        refreshList();
                      }
                    });
                  })(dropzones[i]);
                }
              }
              function setupPreferredDaysDropdown(fm) {
                var groups = fm.querySelectorAll('[data-pref-days-dropdown]');
                for (var gi = 0; gi < groups.length; gi++) {
                  (function(group){
                    var button = group.querySelector('[data-pref-days-button]');
                    var menu = group.querySelector('[data-pref-days-menu]');
                    var summary = group.querySelector('[data-pref-days-summary]');
                    var hidden = group.querySelector('[data-preferred-days-hidden]');
                    var options = group.querySelectorAll('[data-pref-day]');

                    if (!button || !menu || !summary || !hidden || !options || !options.length) return;

                    function selectedFromHidden() {
                      var val = hidden.value || '';
                      return val ? val.split(',').map(function(x){ return x.trim(); }).filter(Boolean) : [];
                    }

                    function updateUI(selected) {
                      for (var oi = 0; oi < options.length; oi++) {
                        var opt = options[oi];
                        var day = opt.getAttribute('data-pref-day');
                        var isActive = selected.indexOf(day) >= 0;
                        opt.classList.toggle('active', isActive);
                        opt.setAttribute('aria-selected', isActive ? 'true' : 'false');
                      }

                      if (!selected.length) {
                        summary.textContent = 'Preferred days';
                      } else {
                        // Always show the chosen days (even for 3+ selections).
                        summary.textContent = selected.join(', ');
                      }
                    }

                    function toggleMenu(open) {
                      var shouldOpen = (typeof open === 'boolean') ? open : !menu.classList.contains('open');
                      if (shouldOpen) menu.classList.add('open');
                      else menu.classList.remove('open');
                      button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
                    }

                    function toggleDay(day) {
                      var selected = selectedFromHidden();
                      var idx = selected.indexOf(day);
                      if (idx >= 0) selected.splice(idx, 1);
                      else selected.push(day);
                      hidden.value = selected.join(',');
                      updateUI(selected);
                    }

                    // Initialize UI from current hidden value
                    updateUI(selectedFromHidden());

                    button.addEventListener('click', function(e){
                      e.preventDefault();
                      e.stopPropagation();
                      toggleMenu();
                    });

                    for (var oi = 0; oi < options.length; oi++) {
                      (function(opt){
                        var day = opt.getAttribute('data-pref-day');
                        opt.addEventListener('click', function(e){
                          e.preventDefault();
                          e.stopPropagation();
                          toggleDay(day);
                        });
                      })(options[oi]);
                    }

                    document.addEventListener('click', function(ev){
                      if (!group.contains(ev.target)) {
                        menu.classList.remove('open');
                        button.setAttribute('aria-expanded', 'false');
                      }
                    });
                  })(groups[gi]);
                }
              }
              var fm = document.getElementById('book-form');
              if (fm) {
              setupDropzones(fm);
              setupPreferredDaysDropdown(fm);
              fm.addEventListener('submit', function(ev){
                ev.preventDefault();
                var errEl = document.getElementById('form-error');
                errEl.style.display = 'none';
                var btn = fm.querySelector('button[type="submit"]');
                btn.disabled = true;
                var origText = btn.textContent;
                btn.textContent = 'Uploading…';
                var formResponses = {};
                [].forEach.call(fm.querySelectorAll('[data-key]'), function(el){
                  if (el.getAttribute('data-type') === 'file') return;
                  var k = el.getAttribute('data-key');
                  var v = (el.value||'').trim();
                  if (k) formResponses[k] = v || null;
                });
                uploadFileFields(fm, tenant.id, formResponses).then(function() {
                  btn.textContent = 'Submitting…';
                  var customerName = formResponses.name || '';
                  function normalizeEmail(v) {
                    return (v || '').toString().trim().toLowerCase().replace(/\s+/g, '');
                  }
                  function normalizePhone(raw) {
                    var s = (raw || '').toString().trim();
                    if (!s) return null;

                    var hasPlus = s.charAt(0) === '+';
                    var digits = s.replace(/\D/g, '');
                    if (!digits) return null;

                    function formatUS10(d10) {
                      return '(' + d10.slice(0,3) + ') ' + d10.slice(3,6) + ' - ' + d10.slice(6,10);
                    }

                    // US +1 or 10-digit formats
                    if (digits.length === 10) return formatUS10(digits);
                    if (digits.length === 11 && digits.charAt(0) === '1') return formatUS10(digits.slice(1));

                    // If user entered +<country>, preserve best-effort with +
                    if (hasPlus) return '+' + digits;

                    // Best-effort for all other countries: prefix + for anything >= 7 digits
                    if (digits.length >= 7) return '+' + digits;

                    // Too short: keep raw digits
                    return digits;
                  }
                  var customerEmail = normalizeEmail(formResponses.email);
                  var customerPhone = normalizePhone(formResponses.phone);
                  var preferredDays = null;
                  if (formResponses.preferredDays) {
                    preferredDays = (formResponses.preferredDays || '')
                      .toString()
                      .split(',')
                      .map(function(x){ return (x||'').trim(); })
                      .filter(Boolean);
                    if (!preferredDays.length) preferredDays = null;
                  }
                  var preferredTime =
                    (formResponses.preferredTime || formResponses.preferredTimeOfDay || '').toString().trim();
                  if (!preferredTime) preferredTime = null;
                  var serviceId = null, serviceSlugVal = null, serviceName = null;
                  var sel = fm.querySelector('[data-key="service"]');
                  if (sel && sel.options && sel.options[sel.selectedIndex]) {
                    var opt = sel.options[sel.selectedIndex];
                    serviceId = opt.value;
                    serviceSlugVal = opt.dataset.slug || null;
                    serviceName = opt.dataset.name || null;
                  }
                  if (!serviceId) {
                    errEl.textContent = 'Please select a service.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = origText;
                    return;
                  }
                  return functions.httpsCallable('createBookingRequestFromWeb')({
                    tenantSlug: tenant.slug,
                    customerName: customerName,
                    customerEmail: customerEmail,
                    customerPhone: customerPhone,
                    serviceId: serviceId,
                    serviceSlug: serviceSlugVal,
                    serviceName: serviceName,
                    preferredTime: preferredTime,
                    preferredDays: preferredDays,
                    notes: formResponses.notes || null,
                    formResponses: formResponses
                  });
                }).then(function(){
                  document.getElementById('root').innerHTML = '<div class="container">'+success()+'</div>';
                  applyBranding(tenant);
                }).catch(function(e){
                  errEl.textContent = (e && e.message) ? e.message : 'Something went wrong. Please try again.';
                  errEl.style.display = 'block';
                  btn.disabled = false;
                  btn.textContent = origText;
                });
              });
              }
            }
          });
        }).catch(function(e){
          console.error(e);
          document.getElementById('root').innerHTML = '<div class="container">'+err(e && e.message ? e.message : 'Failed to load.')+'</div>';
        });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  </script>
</body>
</html>
