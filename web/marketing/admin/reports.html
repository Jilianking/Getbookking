<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly reports — Bookking Admin</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png?v=13" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/admin.css?v=3" />
</head>
<body class="admin-body">
  <div class="admin-shell" id="adminShell"><div class="admin-loading" style="padding:48px">Loading admin portal…</div></div>
  <script src="/js/firebase-config.js"></script>
  <script src="/assets/portal-origins.js?v=1"></script>
  <script src="/assets/admin.js?v=6"></script>
  <script src="/assets/firebase-loader.js?v=1"></script>
  <script>
    var fb;
    var adminUser;
    BetaAdmin.boot('reports').then(function (ctx) {
      fb = ctx.fb;
      adminUser = ctx.user;
      renderPage();
      return loadReports();
    }).catch(function (err) {
      BetaAdmin.showAdminError(BetaAdmin.callableMessage(err));
    });

    function renderPage() {
      document.getElementById('adminMain').innerHTML =
        '<div class="admin-topbar"><div><h1>Weekly reports</h1><p class="admin-subtitle">Publish updates for beta testers</p></div></div>' +
        '<div class="admin-card" style="padding:20px;margin-bottom:20px">' +
          '<h2 style="font-size:18px;margin-bottom:14px">Publish new report</h2>' +
          '<form id="reportForm" class="admin-form">' +
            '<div class="admin-field"><label for="weekLabel">Week label</label><input id="weekLabel" placeholder="Week of Jul 1" required /></div>' +
            '<div class="admin-field"><label for="title">Title</label><input id="title" placeholder="Beta update" required /></div>' +
            '<div class="admin-field"><label for="body">Body</label><textarea id="body" required></textarea></div>' +
            '<div class="admin-field"><label for="insight">Top theme (optional)</label><input id="insight" placeholder="testers want SMS booking reminders" /></div>' +
            '<div class="admin-field"><label for="submissionCount">Submissions count</label><input id="submissionCount" type="number" min="0" value="0" /></div>' +
            '<button type="submit" class="admin-btn admin-btn--primary">Publish report</button>' +
          '</form>' +
        '</div>' +
        '<div class="admin-card admin-table-wrap" id="reportsList"><div class="admin-loading">Loading…</div></div>';

      document.getElementById('reportForm').addEventListener('submit', function (e) {
        e.preventDefault();
        BetaAdmin.callCallable(fb, adminUser, 'publishBetaWeeklyReport', {
          weekLabel: document.getElementById('weekLabel').value.trim(),
          title: document.getElementById('title').value.trim(),
          body: document.getElementById('body').value.trim(),
          insight: document.getElementById('insight').value.trim(),
          submissionCount: parseInt(document.getElementById('submissionCount').value, 10) || 0
        }).then(function () {
          document.getElementById('reportForm').reset();
          return loadReports();
        }).catch(function (err) { alert(BetaAdmin.callableMessage(err)); });
      });
    }

    function loadReports() {
      return BetaAdmin.callCallable(fb, adminUser, 'listBetaReports', { limit: 50 }).then(function (res) {
        var items = (res.data && res.data.items) || [];
        var el = document.getElementById('reportsList');
        if (!items.length) {
          el.innerHTML = '<div class="admin-empty admin-loading">No reports published yet.</div>';
          return;
        }
        el.innerHTML = '<table class="admin-table"><thead><tr><th>Week</th><th>Title</th><th>Submissions</th><th>Published</th></tr></thead><tbody>' +
          items.map(function (item) {
            return '<tr><td>' + BetaAdmin.escapeHtml(item.weekLabel) + '</td><td>' + BetaAdmin.escapeHtml(item.title) +
              (item.insight ? '<div class="admin-list-meta">✨ ' + BetaAdmin.escapeHtml(item.insight) + '</div>' : '') +
              '<div class="admin-list-meta" style="margin-top:6px">' + BetaAdmin.escapeHtml(item.body || '') + '</div></td><td>' +
              (item.submissionCount || 0) + '</td><td>' + BetaAdmin.timeAgo(item.publishedAt) + '</td></tr>';
          }).join('') + '</tbody></table>';
      });
    }
  </script>
</body>
</html>
