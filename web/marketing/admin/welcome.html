<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <script src="/assets/portal-origins.js?v=1"></script>
</head>
<body>
  <p>Redirecting to beta setup…</p>
  <script>
    (function () {
      var target = (window.PortalOrigins && !window.PortalOrigins.isDevHost())
        ? window.PortalOrigins.absoluteUrl('beta', '/beta/welcome')
        : '/beta/welcome';
      window.location.replace(target + window.location.search + window.location.hash);
    })();
  </script>
</body>
</html>
