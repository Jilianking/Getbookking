<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Bookking Beta</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png?v=13" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/admin.css?v=3" />
  <style>
    .admin-login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: var(--admin-bg);
    }
    .admin-login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--admin-border);
      border-radius: 16px;
      padding: 36px 32px;
    }
    .admin-login-card h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 30px;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .admin-login-card p { color: var(--admin-muted); font-size: 14px; margin-bottom: 24px; }
    .admin-login-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--admin-muted);
      margin-bottom: 6px;
    }
    .admin-login-card input {
      width: 100%;
      border: 1px solid var(--admin-border);
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      margin-bottom: 14px;
    }
    .admin-login-error { color: #b42318; font-size: 14px; margin-bottom: 12px; }
    .admin-login-success { color: #1a7f4b; font-size: 14px; margin-bottom: 12px; }
    .admin-login-footer {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
    }
    .admin-login-footer a {
      color: var(--admin-accent, #8B6F47);
      font-weight: 500;
      text-decoration: none;
    }
    .admin-login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div class="admin-brand" style="margin-bottom: 20px; padding: 0;">
        <img src="/assets/brand/logo-dark-128.png?v=12" alt="" width="36" height="36" />
        <div class="admin-brand-text">Bookking</div>
        <span class="admin-pill">Beta</span>
      </div>

      <h1>Forgot password</h1>
      <p>We&rsquo;ll email you a link to reset your password.</p>
      <p class="admin-login-error" id="resetError" hidden></p>
      <p class="admin-login-success" id="resetSuccess" hidden></p>
      <form id="resetForm">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required />
        <button type="submit" class="admin-btn admin-btn--primary" style="width:100%;justify-content:center" id="submitBtn">Send reset link</button>
      </form>
      <div class="admin-login-footer">
        <a href="/beta/login">Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="/assets/portal-origins.js?v=1"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/assets/beta.js?v=2"></script>
  <script src="/assets/firebase-loader.js?v=1"></script>
  <script src="/assets/portal-send-password-reset.js?v=1"></script>
  <script>
    (function () {
      var emailInput = document.getElementById('email');
      var errorEl = document.getElementById('resetError');
      var successEl = document.getElementById('resetSuccess');
      var submitBtn = document.getElementById('submitBtn');

      var emailParam = (new URLSearchParams(window.location.search).get('email') || '').trim();
      if (emailParam) {
        emailInput.value = emailParam;
      }

      function showError(msg) {
        errorEl.hidden = !msg;
        errorEl.textContent = msg || '';
        if (msg) successEl.hidden = true;
      }

      function showSuccess(msg) {
        successEl.hidden = !msg;
        successEl.textContent = msg || '';
        if (msg) errorEl.hidden = true;
      }

      document.getElementById('resetForm').addEventListener('submit', function (ev) {
        ev.preventDefault();
        var email = emailInput.value.trim();
        if (!email) {
          showError('Enter your email address.');
          return;
        }
        showError('');
        showSuccess('');
        submitBtn.disabled = true;
        BetaPortal.bootFirebase().then(function () {
          return PortalSendPasswordReset.send(email, 'beta');
        }).then(function () {
          submitBtn.disabled = false;
          showSuccess('Check your email for a reset link.');
        }).catch(function (err) {
          submitBtn.disabled = false;
          showError(PortalSendPasswordReset.callableMessage(err) || 'Could not send reset email.');
        });
      });
    })();
  </script>
</body>
</html>
