<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beta sign in — Bookking</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png?v=8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/admin.css?v=3" />
  <style>
    .admin-login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: var(--admin-bg);
    }
    .admin-login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--admin-border);
      border-radius: 16px;
      padding: 36px 32px;
    }
    .admin-login-card h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 30px;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .admin-login-card p { color: var(--admin-muted); font-size: 14px; margin-bottom: 24px; }
    .admin-login-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--admin-muted);
      margin-bottom: 6px;
    }
    .admin-login-card input {
      width: 100%;
      border: 1px solid var(--admin-border);
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      margin-bottom: 14px;
    }
    .admin-login-error { color: #b42318; font-size: 14px; margin-bottom: 12px; }
  </style>
</head>
<body class="admin-body">
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div class="admin-brand" style="margin-bottom: 20px; padding: 0;">
        <img src="/assets/brand/logo-dark-128.png?v=8" alt="" width="36" height="36" />
        <div class="admin-brand-text">Bookking</div>
        <span class="admin-pill">Beta</span>
      </div>
      <h1>Sign in</h1>
      <p>Beta tester portal</p>
      <p class="admin-login-error" id="loginError" hidden></p>
      <form id="betaLoginForm">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <button type="submit" class="admin-btn admin-btn--primary" style="width:100%;justify-content:center" id="submitBtn">Continue</button>
      </form>
    </div>
  </div>

  <script src="/js/firebase-config.js"></script>
  <script src="/assets/beta.js?v=1"></script>
  <script src="/assets/firebase-loader.js?v=1"></script>
  <script>
    (function () {
      var fb = null;
      var ready = false;

      function showError(msg) {
        var el = document.getElementById('loginError');
        el.hidden = !msg;
        el.textContent = msg || '';
      }

      function verifyTesterAndRedirect(user) {
        return user.getIdToken(true).then(function () {
          return fb.fns.httpsCallable('getBetaTesterPortal')();
        }).then(function () {
          window.location.replace(BetaPortal.postLoginDestination());
        });
      }

      document.getElementById('betaLoginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        showError('');
        if (!ready || !fb) {
          showError('Still loading sign-in. Please wait a moment and try again.');
          return;
        }
        var btn = document.getElementById('submitBtn');
        btn.disabled = true;
        fb.auth.signInWithEmailAndPassword(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        ).then(function (cred) {
          return verifyTesterAndRedirect(cred.user);
        }).catch(function (err) {
          btn.disabled = false;
          var code = err && err.code ? err.code : '';
          if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
            showError('Incorrect email or password.');
          } else if (code === 'permission-denied') {
            showError('Beta portal access is not enabled for this account.');
          } else {
            showError(BetaPortal.callableMessage(err));
          }
        });
      });

      BetaPortal.bootFirebase().then(function (ctx) {
        fb = ctx.fb;
        ready = true;
        fb.auth.onAuthStateChanged(function (user) {
          if (!user) return;
          verifyTesterAndRedirect(user).catch(function (err) {
            showError(BetaPortal.callableMessage(err));
            fb.auth.signOut();
          });
        });
      }).catch(function (err) {
        showError(BetaPortal.callableMessage(err));
        document.getElementById('submitBtn').disabled = true;
      });
    })();
  </script>
</body>
</html>
