<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Get Bookking</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/brand/logo-dark-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-dark: #2C2018;
      --brand-warm: #8B6F47;
      --brand-cream: #F5EDD8;
      --brand-offwhite: #FDFAF6;
      --text-primary: #1A1410;
      --text-secondary: #6B5E4A;
      --border: #E8E0D4;
      --error: #b42318;
      --success: #1a7f4b;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text-primary);
      background: var(--brand-offwhite);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .acct-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--border);
    }
    .acct-header a.brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-decoration: none;
    }
    .acct-header a.brand img { width: 32px; height: 32px; }
    .acct-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .acct-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 40px 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .acct-card h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .acct-card .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      margin-bottom: 18px;
    }
    input:focus { outline: none; border-color: var(--brand-warm); box-shadow: 0 0 0 2px rgba(139, 111, 71, 0.15); }
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: var(--brand-dark);
      color: var(--brand-cream);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .msg { font-size: 14px; margin-top: 12px; display: none; }
    .msg.visible { display: block; }
    .msg.error { color: var(--error); }
    .msg.success { color: var(--success); }
    .footer-links { text-align: center; margin-top: 24px; font-size: 14px; }
    .footer-links a { color: var(--brand-warm); font-weight: 500; text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
    @media (max-width: 520px) { .acct-header { padding: 0 20px; } }
  </style>
</head>
<body>
  <header class="acct-header">
    <a class="brand" href="index.html" aria-label="Get Bookking — home">
      <img src="assets/brand/logo-dark-64.png" alt="" width="32" height="32" />
      <span>Get Bookking</span>
    </a>
  </header>

  <div class="acct-wrap">
    <div class="acct-card">
      <h1>Forgot password</h1>
      <p class="subtitle">We’ll email you a link to reset your password.</p>
      <form id="resetForm" autocomplete="on">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="username" required />
        <button type="submit" class="btn-primary" id="submitBtn">Send reset link</button>
      </form>
      <p class="msg error" id="errorMsg"></p>
      <p class="msg success" id="successMsg"></p>
      <div class="footer-links">
        <a href="login.html">Back to log in</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();

    var emailInput = document.getElementById('email');
    var errorEl = document.getElementById('errorMsg');
    var successEl = document.getElementById('successMsg');
    var submitBtn = document.getElementById('submitBtn');

    var emailParam = (new URLSearchParams(window.location.search).get('email') || '').trim();
    if (emailParam) {
      emailInput.value = emailParam;
    }

    function showError(msg) {
      errorEl.textContent = msg || '';
      errorEl.classList.toggle('visible', !!msg);
      if (msg) successEl.classList.remove('visible');
    }

    function showSuccess(msg) {
      successEl.textContent = msg || '';
      successEl.classList.toggle('visible', !!msg);
      if (msg) errorEl.classList.remove('visible');
    }

    document.getElementById('resetForm').addEventListener('submit', function(ev) {
      ev.preventDefault();
      var email = emailInput.value.trim();
      if (!email) {
        showError('Enter your email address.');
        return;
      }
      showError('');
      showSuccess('');
      submitBtn.disabled = true;
      auth.sendPasswordResetEmail(email)
        .then(function() {
          submitBtn.disabled = false;
          showSuccess('Check your email for a reset link.');
        })
        .catch(function(e) {
          submitBtn.disabled = false;
          showError((e && e.message) ? e.message : 'Could not send reset email.');
        });
    });
  </script>
</body>
</html>
