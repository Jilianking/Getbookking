<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Get Bookking</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png?v=13" />
  <link rel="icon" type="image/png" sizes="128x128" href="assets/brand/favicon-128.png?v=13" />
  <link rel="apple-touch-icon" sizes="256x256" href="assets/brand/favicon-256.png?v=13" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-dark: #2C2018;
      --brand-warm: #8B6F47;
      --brand-cream: #F5EDD8;
      --brand-offwhite: #FDFAF6;
      --text-primary: #1A1410;
      --text-secondary: #6B5E4A;
      --text-tertiary: #9A8A7A;
      --border: #E8E0D4;
      --error: #b42318;
    }
    html {
      width: 100%;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text-primary);
      background: var(--brand-offwhite);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }
    .acct-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 80px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .acct-header a.brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI Variable Display", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 200;
      font-size: 22px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-decoration: none;
      line-height: 1;
    }
    .acct-header a.brand img { width: 56px; height: 56px; display: block; flex-shrink: 0; border-radius: 50%; }
    .acct-header nav { display: flex; gap: 20px; align-items: center; font-size: 14px; }
    .acct-header nav a { color: var(--text-secondary); text-decoration: none; }
    .acct-header nav a:hover { color: var(--text-primary); }
    .acct-header nav a.acct-header-signup {
      padding: 9px 20px;
      border: 1px solid var(--brand-dark);
      border-radius: 8px;
      background: var(--brand-dark);
      color: var(--brand-cream);
      font-weight: 500;
    }
    .acct-header nav a.acct-header-signup:hover {
      opacity: 0.92;
      color: var(--brand-cream);
    }
    .acct-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .acct-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 40px 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .acct-card h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .acct-card .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      margin-bottom: 18px;
    }
    input:focus { outline: none; border-color: var(--brand-warm); box-shadow: 0 0 0 2px rgba(139, 111, 71, 0.15); }
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: var(--brand-dark);
      color: var(--brand-cream);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .error-msg { color: var(--error); font-size: 14px; margin-top: 12px; display: none; }
    .error-msg.visible { display: block; }
    .footer-links { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
    .footer-links a { color: var(--brand-warm); font-weight: 500; text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
    .login-panel.hidden { display: none; }
    .signed-in-email { font-weight: 500; color: var(--text-primary); margin-bottom: 20px; }
    .btn-secondary {
      width: 100%;
      padding: 14px 20px;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-secondary:hover { background: var(--brand-offwhite); }
    .timeout-msg {
      font-size: 14px;
      color: var(--text-secondary);
      background: var(--brand-offwhite);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 20px;
    }
    @media (max-width: 520px) { .acct-header { padding: 0 20px; } }
  </style>
  <link rel="stylesheet" href="assets/portal-auth-fields.css?v=1" />
</head>
<body>
  <header class="acct-header">
    <a class="brand" href="index.html" aria-label="Get Bookking — home">
      <img src="assets/brand/logo-dark-128.png?v=12" alt="" width="56" height="56" />
      <span>Get Bookking</span>
    </a>
    <nav>
      <a href="login.html">Log in</a>
      <a href="signup.html" class="acct-header-signup">Sign up</a>
    </nav>
  </header>

  <div class="acct-wrap">
    <div class="acct-card">
      <div id="loginSignedInPanel" class="login-panel hidden">
        <h1>Already signed in</h1>
        <p class="subtitle">You have an active session on this browser.</p>
        <p class="signed-in-email" id="signedInEmail"></p>
        <a href="account.html" class="btn-primary" id="continueBtn" style="display:block;text-align:center;text-decoration:none;">Go to my account</a>
        <button type="button" class="btn-secondary" id="switchAccountBtn">Sign in as someone else</button>
      </div>
      <div id="loginFormPanel" class="login-panel">
        <h1>Log in</h1>
        <p class="subtitle">Manage your subscription and open your live site.</p>
        <p class="timeout-msg hidden" id="timeoutMsg">Your session expired after 15 minutes of inactivity. Please sign in again.</p>
        <form id="loginForm" autocomplete="on">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="username" required />
        <label for="password">Password</label>
        <div class="portal-auth-field">
          <input type="password" id="password" name="password" autocomplete="current-password" required />
          <button type="button" class="portal-auth-eye" data-password-toggle="password" aria-label="Show password"></button>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Log in</button>
      </form>
      <p class="error-msg" id="errorMsg"></p>
      <div class="footer-links">
        <a href="forgot-password.html" id="forgotLink">Forgot password?</a>
        &nbsp;&middot;&nbsp;
        <a href="signup.html">Create an account</a>
      </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="assets/portal-origins.js?v=1"></script>
  <script src="assets/portal-login.js?v=1"></script>
  <script src="assets/portal-password-toggle.js?v=1"></script>
  <script>
    PortalPasswordToggle.bind();
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();

    (function applyQueryParams() {
      var params = new URLSearchParams(window.location.search);
      var emailParam = (params.get('email') || '').trim();
      if (emailParam) {
        document.getElementById('email').value = emailParam;
      }
      if (params.get('timeout') === '1') {
        document.getElementById('timeoutMsg').classList.remove('hidden');
      }
    })();

    function postLoginDestination() {
      var params = new URLSearchParams(window.location.search);
      var next = (params.get('next') || '').trim();
      if (!next || next.indexOf('://') !== -1) return 'account.html';
      if (next.charAt(0) === '/' || next.indexOf('..') !== -1) return 'account.html';
      return next;
    }

    document.getElementById('forgotLink').addEventListener('click', function(ev) {
      var email = document.getElementById('email').value.trim();
      if (email) {
        ev.preventDefault();
        window.location.href = 'forgot-password.html?email=' + encodeURIComponent(email);
      }
    });

    PortalLogin.init({
      auth: auth,
      formId: 'loginForm',
      signedInPanelId: 'loginSignedInPanel',
      formPanelId: 'loginFormPanel',
      signedInEmailId: 'signedInEmail',
      switchBtnId: 'switchAccountBtn',
      submitBtnId: 'submitBtn',
      errorElId: 'errorMsg',
      emailInputId: 'email',
      passwordInputId: 'password',
      continueBtnId: 'continueBtn',
      getDestination: postLoginDestination,
      onVerify: null,
      formatVerifyError: PortalLogin.authErrorMessage,
      getContinueLabel: function(dest) {
        return dest.indexOf('billing.html') !== -1 ? 'Continue to billing' : 'Go to my account';
      },
      autoRedirectWhenSignedIn: true
    });
  </script>
  <script src="assets/nav-auth.js?v=4"></script>
</body>
</html>
