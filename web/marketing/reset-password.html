<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — Bookking</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png?v=13" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/admin.css?v=3" />
  <link rel="stylesheet" href="/assets/portal-reset-password.css?v=1" />
  <link rel="stylesheet" href="/assets/portal-auth-fields.css?v=1" />
</head>
<body class="admin-body">
  <div class="portal-auth-wrap">
    <div class="portal-auth-card">
      <div class="admin-brand" style="margin-bottom: 20px; padding: 0;">
        <img src="/assets/brand/logo-dark-128.png?v=12" alt="" width="36" height="36" />
        <div class="admin-brand-text">Bookking</div>
        <span class="admin-pill" id="portalPill" hidden></span>
      </div>

      <div id="loadingPanel" class="portal-auth-panel">
        <h1>Reset your password</h1>
        <p class="portal-auth-muted">Verifying your reset link&hellip;</p>
      </div>

      <div id="invalidPanel" class="portal-auth-panel" hidden>
        <h1>Reset link problem</h1>
        <p class="portal-auth-error" id="invalidMessage"></p>
        <div class="portal-auth-footer">
          <a href="/login.html" id="invalidBackLink">Back to sign in</a>
        </div>
      </div>

      <div id="formPanel" class="portal-auth-panel" hidden>
        <h1>Reset your password</h1>
        <p>for <span class="portal-auth-email" id="emailDisplay"></span></p>
        <p class="portal-auth-error" id="resetError" hidden></p>
        <form id="resetPasswordForm" autocomplete="on">
          <label for="newPassword">New password</label>
          <div class="portal-auth-field">
            <input id="newPassword" type="password" autocomplete="new-password" minlength="6" required />
            <button type="button" class="portal-auth-eye" data-password-toggle="newPassword" aria-label="Show password"></button>
          </div>
          <label for="confirmPassword">Confirm new password</label>
          <div class="portal-auth-field">
            <input id="confirmPassword" type="password" autocomplete="new-password" minlength="6" required />
            <button type="button" class="portal-auth-eye" data-password-toggle="confirmPassword" aria-label="Show password"></button>
          </div>
          <button type="submit" class="admin-btn admin-btn--primary" style="width:100%;justify-content:center" id="submitBtn">Save password</button>
        </form>
        <div class="portal-auth-footer">
          <a href="/login.html" id="backToLogin">Back to sign in</a>
        </div>
      </div>

      <div id="successPanel" class="portal-auth-panel" hidden>
        <h1>Password updated</h1>
        <p class="portal-auth-success">Your password was saved. Redirecting you to sign in&hellip;</p>
      </div>
    </div>
  </div>

  <script src="/assets/portal-origins.js?v=1"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/assets/firebase-loader.js?v=1"></script>
  <script src="/assets/portal-password-toggle.js?v=1"></script>
  <script src="/assets/portal-reset-password.js?v=1"></script>
  <script>
    PortalPasswordToggle.bind();
    (function () {
      var loader = window.BetaAdminFirebase;
      if (!loader) {
        document.getElementById('loadingPanel').hidden = true;
        document.getElementById('invalidPanel').hidden = false;
        document.getElementById('invalidMessage').textContent = 'Firebase loader is missing.';
        return;
      }
      loader.load(['app', 'auth']).then(function () {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        PortalResetPassword.init();
      }).catch(function (err) {
        document.getElementById('loadingPanel').hidden = true;
        document.getElementById('invalidPanel').hidden = false;
        document.getElementById('invalidMessage').textContent = err.message || 'Could not load sign-in tools.';
      });
    })();
  </script>
</body>
</html>
